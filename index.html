<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>にっこり対戦表メーカー</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas CDN for rendering table to image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        @import url('https://fonts.googleapis.com/css2?family=Line+Seed+JP:wght@400;700;800&family=Nunito:wght@400;700;900&display=swap');
        body {
            font-family: 'Line Seed JP', 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        /* html2canvas render fix for text cropping */
        .capture-safe-text {
            line-height: 1.2 !important;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col bg-slate-50">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SettingsIcon = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        );

        const PlusIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <line x1="12" x2="12" y1="5" y2="19" />
                <line x1="5" x2="19" y1="12" y2="12" />
            </svg>
        );

        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
        );

        const HomeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
        );

        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const DEFAULT_GROUPS = [];

        const PRIORITY_LABELS = {
            count: '出場数均等',
            break: '連続休憩回避',
            consecutive: '連続出場回避',
            pair: '同一ペア回避',
            opponent: '同一相手回避',
            card: '同一カード回避',
            gender: '男女バランス'
        };

        const DEFAULT_PRIORITY = ['count', 'break', 'consecutive', 'pair', 'opponent', 'card', 'gender'];

        const ensurePriorityList = (pList) => {
            if (!Array.isArray(pList)) return DEFAULT_PRIORITY;
            let list = pList.filter(p => Object.keys(PRIORITY_LABELS).includes(p));
            DEFAULT_PRIORITY.forEach(dp => {
                if (!list.includes(dp)) list.push(dp);
            });
            return list;
        };

        const normalizeGenderMode = (mode) => {
            if (['mix', 'balance', 'consider', 'none'].includes(mode)) return mode;
            return 'none';
        };

        const getStats = (playerId, history) => {
            let matchCount = 0;
            for (const h of history) {
                if (h.players.includes(playerId)) matchCount++;
            }

            let consecutiveRest = 0;
            for (let i = history.length - 1; i >= 0; i--) {
                if (!history[i].players.includes(playerId)) consecutiveRest++;
                else break;
            }

            let consecutivePlay = 0;
            for (let i = history.length - 1; i >= 0; i--) {
                if (history[i].players.includes(playerId)) consecutivePlay++;
                else break;
            }

            return { matchCount, consecutiveRest, consecutivePlay };
        };

        const calculatePenalty = (config, criterion, history, genderMode, presentMembers) => {
            const courtIds = new Set(config.players.map(p => p.id));
            
            // ①出場数均等：各プレイヤーの「今回を含む出場数」の2乗の合計
            if (criterion === 'count') {
                let sum = 0;
                presentMembers.forEach(m => {
                    const stats = getStats(m.id, history);
                    const newCount = stats.matchCount + (courtIds.has(m.id) ? 1 : 0);
                    sum += Math.pow(newCount, 2);
                });
                return sum;
            }
            
            // ②連続休憩回避：各プレイヤーの「今回を含む連続休憩数」の2乗の合計
            if (criterion === 'break') {
                let sum = 0;
                presentMembers.forEach(m => {
                    const stats = getStats(m.id, history);
                    const newBreak = courtIds.has(m.id) ? 0 : stats.consecutiveRest + 1;
                    sum += Math.pow(newBreak, 2);
                });
                return sum;
            }
            
            // ③連続出場回避：各プレイヤーの「今回を含む連続出場数」の2乗の合計
            if (criterion === 'consecutive') {
                let sum = 0;
                presentMembers.forEach(m => {
                    const stats = getStats(m.id, history);
                    const newCons = courtIds.has(m.id) ? stats.consecutivePlay + 1 : 0;
                    sum += Math.pow(newCons, 2);
                });
                return sum;
            }
            
            // ④同一ペア回避：各プレイヤーの「今回のペアでの今回を含む出場数」の2乗の合計
            if (criterion === 'pair') {
                let sum = 0;
                const t1 = config.t1.map(p => p.id);
                const t2 = config.t2.map(p => p.id);
                
                const getPairCount = (pA, pB) => {
                    let count = 0;
                    history.forEach(m => {
                        if ((m.t1.includes(pA) && m.t1.includes(pB)) || 
                            (m.t2.includes(pA) && m.t2.includes(pB))) {
                            count++;
                        }
                    });
                    return count;
                };

                presentMembers.forEach(m => {
                    if (t1.includes(m.id)) {
                        const partner = t1[0] === m.id ? t1[1] : t1[0];
                        sum += Math.pow(getPairCount(m.id, partner) + 1, 2);
                    } else if (t2.includes(m.id)) {
                        const partner = t2[0] === m.id ? t2[1] : t2[0];
                        sum += Math.pow(getPairCount(m.id, partner) + 1, 2);
                    }
                });
                return sum;
            }
            
            // ⑤同一相手回避：各プレイヤーの「今回の相手との今回を含む対戦数」の2乗の合計
            if (criterion === 'opponent') {
                let sum = 0;
                const t1 = config.t1.map(p => p.id);
                const t2 = config.t2.map(p => p.id);

                const getOpponentCount = (pA, pB) => {
                    let count = 0;
                    history.forEach(m => {
                        if ((m.t1.includes(pA) && m.t2.includes(pB)) || 
                            (m.t2.includes(pA) && m.t1.includes(pB))) {
                            count++;
                        }
                    });
                    return count;
                };

                presentMembers.forEach(m => {
                    if (t1.includes(m.id)) {
                        sum += Math.pow(getOpponentCount(m.id, t2[0]) + 1, 2) + Math.pow(getOpponentCount(m.id, t2[1]) + 1, 2);
                    } else if (t2.includes(m.id)) {
                        sum += Math.pow(getOpponentCount(m.id, t1[0]) + 1, 2) + Math.pow(getOpponentCount(m.id, t1[1]) + 1, 2);
                    }
                });
                return sum;
            }

            // ⑥同一カード回避：対象のすべての組み合わせについて、今回を含む同一カードをカウントしてそのまま点数（低い方が優先）
            if (criterion === 'card') {
                const t1 = config.t1.map(p => p.id).sort().join(',');
                const t2 = config.t2.map(p => p.id).sort().join(',');
                let count = 0;
                history.forEach(m => {
                    const ht1 = [...m.t1].sort().join(',');
                    const ht2 = [...m.t2].sort().join(',');
                    if ((t1 === ht1 && t2 === ht2) || (t1 === ht2 && t2 === ht1)) {
                        count++;
                    }
                });
                return count + 1;
            }
            
            // ⑦男女バランス：指定されたスコア（低い方が優先）
            if (criterion === 'gender') {
                if (genderMode === 'none') return 0;

                const t1Males = config.t1.filter(p => p.gender === "M").length;
                const t2Males = config.t2.filter(p => p.gender === "M").length;
                
                const isM1F1_vs_M1F1 = t1Males === 1 && t2Males === 1;
                const isM2F0_vs_M2F0 = t1Males === 2 && t2Males === 2;
                const isM0F2_vs_M0F2 = t1Males === 0 && t2Males === 0;
                const isM2F0_vs_M1F1 = (t1Males === 2 && t2Males === 1) || (t1Males === 1 && t2Males === 2);
                const isM0F2_vs_M1F1 = (t1Males === 0 && t2Males === 1) || (t1Males === 1 && t2Males === 0);
                const isM2F0_vs_M0F2 = (t1Males === 2 && t2Males === 0) || (t1Males === 0 && t2Males === 2);

                let score = 0;

                if (genderMode === 'mix') {
                    if (isM1F1_vs_M1F1) score = 0;
                    else if (isM2F0_vs_M1F1) score = 20;
                    else if (isM0F2_vs_M1F1) score = 20;
                    else if (isM2F0_vs_M2F0) score = 20;
                    else if (isM0F2_vs_M0F2) score = 20;
                    else if (isM2F0_vs_M0F2) score = 20;
                } else if (genderMode === 'balance') {
                    if (isM1F1_vs_M1F1) score = 0;
                    else if (isM2F0_vs_M1F1) score = 20;
                    else if (isM0F2_vs_M1F1) score = 20;
                    else if (isM2F0_vs_M2F0) score = 0;
                    else if (isM0F2_vs_M0F2) score = 0;
                    else if (isM2F0_vs_M0F2) score = 20;
                } else if (genderMode === 'consider') {
                    if (isM1F1_vs_M1F1) score = 0;
                    else if (isM2F0_vs_M1F1) score = 10;
                    else if (isM0F2_vs_M1F1) score = 10;
                    else if (isM2F0_vs_M2F0) score = 0;
                    else if (isM0F2_vs_M0F2) score = 0;
                    else if (isM2F0_vs_M0F2) score = 20;
                }
                
                return score;
            }
            return 0;
        };

        function evaluateAndCreateNextMatch(presentMembers, history, priorityOrder, genderMode) {
            if (presentMembers.length < 4) return null;

            const N = presentMembers.length;
            const configurations = [];

            // すべての組み合わせを生成
            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    for (let k = j + 1; k < N; k++) {
                        for (let l = k + 1; l < N; l++) {
                            const p1 = presentMembers[i];
                            const p2 = presentMembers[j];
                            const p3 = presentMembers[k];
                            const p4 = presentMembers[l];

                            configurations.push({ players: [p1, p2, p3, p4], t1: [p1, p2], t2: [p3, p4] });
                            configurations.push({ players: [p1, p2, p3, p4], t1: [p1, p3], t2: [p2, p4] });
                            configurations.push({ players: [p1, p2, p3, p4], t1: [p1, p4], t2: [p2, p3] });
                        }
                    }
                }
            }

            let candidates = [...configurations];

            // 優先順位の順に候補を最小点数で絞り込む
            for (const criterion of priorityOrder) {
                const scores = candidates.map(config => calculatePenalty(config, criterion, history, genderMode, presentMembers));
                const minScore = Math.min(...scores);
                
                candidates = candidates.filter((_, idx) => scores[idx] === minScore);
                if (candidates.length === 1) break;
            }

            // 最終的に複数残った場合はランダムに1つを選択
            const chosen = candidates[Math.floor(Math.random() * candidates.length)];
            const chosenCourtIds = new Set(chosen.players.map(p => p.id));
            const chosenAbsentees = presentMembers.filter(m => !chosenCourtIds.has(m.id));

            return {
                id: `match-${history.length + 1}`,
                players: chosen.players.map(p => p.id),
                t1: chosen.t1.map(p => p.id),
                t2: chosen.t2.map(p => p.id),
                absentees: chosenAbsentees.map(p => p.id)
            };
        }

        function App() {
            const [page, setPage] = useState('top');
            const [groups, setGroups] = useState([]);
            const [activeGroupId, setActiveGroupId] = useState(null);
            
            const [groupName, setGroupName] = useState('');
            const [members, setMembers] = useState([]);
            
            // Settings State
            const [priorityOrder, setPriorityOrder] = useState(DEFAULT_PRIORITY);
            const [genderMode, setGenderMode] = useState('none');
            
            const [showSettings, setShowSettings] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            const [matchList, setMatchList] = useState([]);
            const [matchPage, setMatchPage] = useState(0);
            
            const [toast, setToast] = useState({ show: false, message: "" });
            const [capturedImage, setCapturedImage] = useState(null);
            const [showImageModal, setShowImageModal] = useState(false);

            const presentCount = members.filter(m => m.present).length;

            useEffect(() => {
                const stored = localStorage.getItem('nikkori_tennis_groups_v3');
                if (stored) {
                    try {
                        setGroups(JSON.parse(stored));
                    } catch (e) {
                        setGroups(DEFAULT_GROUPS);
                    }
                } else {
                    setGroups(DEFAULT_GROUPS);
                }
            }, []);

            const triggerToast = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: "" }), 2500);
            };

            const handleGoHome = () => {
                setPage('top');
                setActiveGroupId(null);
                setShowSettings(false);
                setShowDeleteConfirm(false);
            };
            
            const handleBackToGroup = () => {
                setPage('group');
            };

            const handleCreateNewGroup = () => {
                const newId = `group-${Date.now()}`;
                const newGroup = {
                    id: newId,
                    name: "",
                    members: [],
                    settings: { priority: DEFAULT_PRIORITY, genderMode: 'none' }
                };
                const updated = [...groups, newGroup];
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups_v3', JSON.stringify(updated));
                
                setActiveGroupId(newId);
                setGroupName("");
                setMembers([]);
                setPriorityOrder(newGroup.settings.priority);
                setGenderMode(normalizeGenderMode(newGroup.settings.genderMode));
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSelectGroup = (gId) => {
                const target = groups.find(g => g.id === gId);
                if (!target) return;
                setActiveGroupId(gId);
                setGroupName(target.name);
                setMembers(target.members || []);
                setPriorityOrder(ensurePriorityList(target.settings?.priority));
                setGenderMode(normalizeGenderMode(target.settings?.genderMode));
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSaveGroup = () => {
                const resolvedName = groupName.trim() || "（名称未設定のグループ）";
                const cleanMembers = members.filter(m => m.name.trim() !== "");

                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return { ...g, name: resolvedName, members: cleanMembers, settings: { priority: priorityOrder, genderMode: genderMode } };
                    }
                    return g;
                });
                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups_v3', JSON.stringify(updatedGroups));
                triggerToast("💾 保存しました");
            };

            const handleDeleteGroup = () => {
                const updated = groups.filter(g => g.id !== activeGroupId);
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups_v3', JSON.stringify(updated));
                handleGoHome();
            };

            const updateMemberName = (index, newName) => {
                if (newName.length > 4) return;
                const isDuplicate = members.some((m, i) => i !== index && m.name === newName && newName !== "");
                if (isDuplicate) {
                    triggerToast("⚠️ 同じメンバー名は使えません");
                    return; 
                }
                const copy = [...members];
                copy[index].name = newName;
                setMembers(copy);
            };

            const toggleMemberGender = (index, gender) => {
                const copy = [...members];
                copy[index].gender = gender;
                setMembers(copy);
            };

            const toggleMemberPresence = (index) => {
                const copy = [...members];
                if (!copy[index].present && presentCount >= 12) {
                    triggerToast("⚠️ 参加者は最大12名までです");
                    return;
                }
                copy[index].present = !copy[index].present;
                setMembers(copy);
            };

            const deleteMember = (index) => {
                const copy = [...members];
                copy.splice(index, 1);
                setMembers(copy);
            };

            const handleAddMember = (name, gender) => {
                if (members.some(m => m.name === name)) {
                    triggerToast("⚠️ 同じメンバー名は使えません");
                    return;
                }
                const isPresent = presentCount < 12;
                const newM = {
                    id: `member-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    name: name.slice(0, 4),
                    gender: gender,
                    present: isPresent
                };
                setMembers([...members, newM]);
                if (!isPresent) triggerToast("⚠️ 最大参加人数の12名に達したため不参加で登録しました");
            };

            const handleCreateMatchTable = () => {
                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);

                if (activeAttendees.length < 4) {
                    triggerToast("⚠️ 試合を行うには参加者が最低4人必要です");
                    return;
                }

                handleSaveGroup();

                const generated = [];
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, generated, priorityOrder, genderMode);
                    if (nextMatch) generated.push(nextMatch);
                    else break;
                }

                setMatchList(generated);
                setMatchPage(0);
                setPage('match');
            };

            const handleNextPageOrGenerate = () => {
                const targetPageIndex = matchPage + 1;
                const requiredMatchesCount = (targetPageIndex + 1) * 10;

                if (matchList.length >= requiredMatchesCount) {
                    setMatchPage(targetPageIndex);
                    return;
                }

                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);
                if (activeAttendees.length < 4) return;

                const nextTen = [];
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, [...matchList, ...nextTen], priorityOrder, genderMode);
                    if (nextMatch) nextTen.push(nextMatch);
                    else break;
                }

                if (nextTen.length === 0) {
                    triggerToast("⚠️ これ以上組み合わせを作れません");
                    return;
                }
                setMatchList([...matchList, ...nextTen]);
                setMatchPage(targetPageIndex);
            };

            const handleCopyImage = async () => {
                const element = document.getElementById('match-table-capture-area');
                if (!element) return;
                
                triggerToast("⏳ コピー中...");
                
                try {
                    const canvas = await html2canvas(element, {
                        scale: 2, 
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        logging: false
                    });

                    canvas.toBlob(async (blob) => {
                        try {
                            const item = new ClipboardItem({ "image/png": blob });
                            await navigator.clipboard.write([item]);
                            triggerToast("✅ コピー完了");
                        } catch (err) {
                            console.error("Clipboard API error:", err);
                            const imgData = URL.createObjectURL(blob);
                            setCapturedImage(imgData);
                            setShowImageModal(true);
                            triggerToast("⚠️ コピーに失敗しました。画像を手動で保存してください。");
                        }
                    }, 'image/png');
                } catch (e) {
                    console.error(e);
                    triggerToast("⚠️ 画像の生成に失敗しました");
                }
            };

            const movePriority = (index, direction) => {
                const newOrder = [...priorityOrder];
                const target = index + direction;
                if (target < 0 || target >= newOrder.length) return;
                [newOrder[index], newOrder[target]] = [newOrder[target], newOrder[index]];
                setPriorityOrder(newOrder);
            };

            const getMemberName = (id) => {
                const m = members.find(p => p.id === id);
                if (!m) return { name: "??", isMale: true };
                return { name: m.name, isMale: m.gender === "M" };
            };

            const NameSpan = ({ player }) => {
                const len = player.name.length;
                const textSize = len >= 4 ? 'text-xs sm:text-sm' : 'text-sm sm:text-base';
                const bgColor = player.isMale ? 'bg-sky-50 text-sky-700 border-sky-100' : 'bg-rose-50 text-rose-700 border-rose-100';
                
                return (
                    <div className={`w-[48%] flex items-center justify-center font-bold h-8 rounded border ${bgColor} ${textSize} px-0.5 capture-safe-text`}>
                        <span className="whitespace-nowrap truncate">{player.name}</span>
                    </div>
                );
            };

            const d = new Date();
            const dateStr = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
            const currentMatches = matchList.slice(matchPage * 10, (matchPage + 1) * 10);

            return (
                <div className="flex-grow flex flex-col justify-between">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center space-x-1.5 cursor-pointer" onClick={handleGoHome}>
                                <span className="font-extrabold text-lg tracking-tight text-slate-800 flex items-center gap-1.5">
                                    <span className="text-xl">😊</span> にっこり対戦表メーカー
                                </span>
                            </div>
                            {page !== 'top' && (
                                <button 
                                    onClick={handleGoHome}
                                    className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full flex items-center justify-center shadow-sm active:scale-95 transition-all"
                                    title="HOMEへ"
                                    aria-label="HOMEへ"
                                >
                                    <HomeIcon />
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="flex-grow max-w-md w-full mx-auto px-4 py-4 pb-10">
                        {page === 'top' && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-6 text-white shadow-md text-center">
                                    <h2 className="text-xl font-black mb-1">にっこり対戦表メーカー</h2>
                                    <p className="text-emerald-50 text-xs">簡単な操作でダブルスの最適な対戦表を作成</p>
                                </div>

                                <div className="space-y-2">
                                    {groups.length === 0 ? (
                                        <div className="text-center py-8 bg-white border border-dashed border-slate-200 rounded-xl text-slate-400 text-sm">
                                            グループがありません。<br/>下のボタンから作成してください。
                                        </div>
                                    ) : (
                                        groups.map(g => (
                                            <button
                                                key={g.id}
                                                onClick={() => handleSelectGroup(g.id)}
                                                className="w-full text-left bg-white border border-slate-100 hover:border-emerald-300 rounded-xl p-4 shadow-sm transition-all flex items-center justify-between group active:scale-[0.99]"
                                            >
                                                <div className="space-y-1">
                                                    <div className="font-bold text-slate-800 group-hover:text-emerald-600">
                                                        {g.name || "（名称未設定のグループ）"}
                                                    </div>
                                                    <div className="text-xs text-slate-400">
                                                        メンバー: {g.members?.length || 0}名
                                                    </div>
                                                </div>
                                                <span className="text-slate-300 group-hover:text-emerald-500">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                                                </span>
                                            </button>
                                        ))
                                    )}
                                </div>

                                <button
                                    onClick={handleCreateNewGroup}
                                    className="w-full bg-slate-800 hover:bg-emerald-600 text-white font-bold py-3.5 px-6 rounded-xl shadow transition-all flex items-center justify-center space-x-2 active:scale-95"
                                >
                                    <PlusIcon /><span>新規グループを作成する</span>
                                </button>
                            </div>
                        )}

                        {page === 'group' && (
                            <div className="space-y-3">
                                <div className="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm flex items-center justify-between gap-2">
                                    <input
                                        type="text"
                                        value={groupName}
                                        onChange={(e) => setGroupName(e.target.value)}
                                        placeholder="グループ名を入力"
                                        className="w-full font-bold text-lg outline-none py-0.5 transition-colors bg-transparent text-slate-800"
                                    />
                                    {!showDeleteConfirm ? (
                                        <button
                                            type="button"
                                            onClick={() => setShowDeleteConfirm(true)}
                                            className="p-1.5 text-slate-400 hover:text-rose-500 rounded-lg hover:bg-rose-50 transition-colors shrink-0"
                                            title="グループを削除"
                                        >
                                            <TrashIcon />
                                        </button>
                                    ) : (
                                        <div className="flex items-center space-x-1 shrink-0 bg-rose-50 p-1 rounded-lg">
                                            <button onClick={handleDeleteGroup} className="bg-rose-500 text-white px-2 py-1 rounded text-[10px] font-bold">削除</button>
                                            <button onClick={() => setShowDeleteConfirm(false)} className="bg-white text-slate-600 border border-slate-200 px-2 py-1 rounded text-[10px] font-bold">取消</button>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm space-y-1">
                                    <div className="flex justify-end items-center mb-1 px-1">
                                        <span className="text-xs font-bold bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg">
                                            登録 {members.length}名 ／ 参加 <span className={presentCount > 0 ? "text-emerald-600 font-extrabold" : ""}>{presentCount}名</span> （最大12名）
                                        </span>
                                    </div>
                                    <div className="mb-2 px-1 py-1 text-[11px] text-slate-400 font-bold">
                                        名前（4文字以内）を入力して、性別を選択してください。
                                    </div>
                                    
                                    <div className="space-y-1.5 pb-2">
                                        {members.map((m, index) => (
                                            <div key={m.id} className="flex items-center space-x-1.5 p-1 border-b border-slate-50">
                                                <button
                                                    onClick={() => toggleMemberPresence(index)}
                                                    className={`w-12 py-1 text-[10px] font-bold rounded shadow-sm transition-all shrink-0 ${
                                                        m.present 
                                                        ? 'bg-emerald-500 text-white' 
                                                        : 'bg-slate-200 text-slate-500'
                                                    }`}
                                                >
                                                    {m.present ? '参加' : '不参加'}
                                                </button>

                                                <input
                                                    type="text"
                                                    value={m.name}
                                                    onChange={(e) => updateMemberName(index, e.target.value)}
                                                    maxLength={4}
                                                    className={`flex-grow bg-transparent border-none focus:ring-0 outline-none text-sm font-bold px-1 ${!m.present ? 'text-slate-400' : ''}`}
                                                />

                                                <div className="flex space-x-1 shrink-0">
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleMemberGender(index, 'M')}
                                                        className={`w-7 py-1 text-[10px] font-bold rounded transition-all ${
                                                            m.gender === 'M'
                                                            ? 'bg-sky-500 text-white shadow-sm'
                                                            : 'bg-white text-slate-400 border border-slate-200'
                                                        }`}
                                                    >
                                                        男
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleMemberGender(index, 'F')}
                                                        className={`w-7 py-1 text-[10px] font-bold rounded transition-all ${
                                                            m.gender === 'F'
                                                            ? 'bg-rose-500 text-white shadow-sm'
                                                            : 'bg-white text-slate-400 border border-slate-200'
                                                        }`}
                                                    >
                                                        女
                                                    </button>
                                                </div>

                                                <button onClick={() => deleteMember(index)} className="p-1 text-slate-300 hover:text-rose-500 shrink-0">
                                                    <TrashIcon />
                                                </button>
                                            </div>
                                        ))}

                                        <EmptyRowCreator onAddMember={handleAddMember} nextNumber={members.length + 1} />
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm relative">
                                    <button
                                        type="button"
                                        onClick={() => setShowSettings(!showSettings)}
                                        className="flex items-center text-xs font-bold text-slate-600 focus:outline-none whitespace-nowrap"
                                    >
                                        <SettingsIcon className="w-4 h-4 mr-1 shrink-0" />
                                        <span className="whitespace-nowrap">詳細設定</span>
                                        <span className={`ml-1 transform transition-transform ${showSettings ? 'rotate-180' : ''}`}>▼</span>
                                    </button>
                                    
                                    <div className="absolute top-2.5 right-3">
                                        <button
                                            type="button"
                                            onClick={handleSaveGroup}
                                            className="bg-slate-500 hover:bg-slate-600 text-white font-bold py-1 px-4 rounded-lg shadow-sm text-xs transition-colors"
                                        >
                                            保存
                                        </button>
                                    </div>

                                    {showSettings && (
                                        <div className="pt-4 space-y-4 mt-2 border-t border-slate-100">
                                            <div className="space-y-2">
                                                <div className="flex justify-between items-end mb-1">
                                                    <h3 className="text-xs font-bold text-slate-700">組み合わせの優先順位</h3>
                                                    <button 
                                                        onClick={() => setPriorityOrder(DEFAULT_PRIORITY)} 
                                                        className="text-[10px] text-emerald-600 font-bold underline"
                                                    >
                                                        初期設定に戻す
                                                    </button>
                                                </div>
                                                <div className="space-y-1">
                                                    {priorityOrder.map((key, index) => (
                                                        <div key={key} className="flex items-center justify-between py-1.5 px-2 bg-slate-50 rounded border border-slate-100">
                                                            <span className="text-xs font-bold text-slate-600">
                                                                <span className="text-slate-400 w-4 inline-block">{index + 1}.</span> 
                                                                {PRIORITY_LABELS[key]}
                                                            </span>
                                                            <div className="flex space-x-1">
                                                                <button onClick={() => movePriority(index, -1)} disabled={index === 0} className="w-6 h-6 flex items-center justify-center bg-white border border-slate-200 rounded text-slate-500 disabled:opacity-30">▲</button>
                                                                <button onClick={() => movePriority(index, 1)} disabled={index === priorityOrder.length - 1} className="w-6 h-6 flex items-center justify-center bg-white border border-slate-200 rounded text-slate-500 disabled:opacity-30">▼</button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="space-y-2 pt-2 border-t border-slate-100">
                                                <h3 className="text-xs font-bold text-slate-700 mb-2">男女バランス設定</h3>
                                                <div className="space-y-1">
                                                    <label className="flex items-center space-x-2 py-1 px-2 hover:bg-slate-50 rounded cursor-pointer">
                                                        <input type="radio" checked={genderMode === 'mix'} onChange={() => setGenderMode('mix')} className="accent-emerald-500" />
                                                        <span className="text-xs font-bold text-slate-600">ミックスダブルス</span>
                                                    </label>
                                                    <label className="flex items-center space-x-2 py-1 px-2 hover:bg-slate-50 rounded cursor-pointer">
                                                        <input type="radio" checked={genderMode === 'balance'} onChange={() => setGenderMode('balance')} className="accent-emerald-500" />
                                                        <span className="text-xs font-bold text-slate-600">男女バランス均等</span>
                                                    </label>
                                                    <label className="flex items-center space-x-2 py-1 px-2 hover:bg-slate-50 rounded cursor-pointer">
                                                        <input type="radio" checked={genderMode === 'consider'} onChange={() => setGenderMode('consider')} className="accent-emerald-500" />
                                                        <span className="text-xs font-bold text-slate-600">男女バランスを考慮する</span>
                                                    </label>
                                                    <label className="flex items-center space-x-2 py-1 px-2 hover:bg-slate-50 rounded cursor-pointer">
                                                        <input type="radio" checked={genderMode === 'none'} onChange={() => setGenderMode('none')} className="accent-emerald-500" />
                                                        <span className="text-xs font-bold text-slate-600">男女バランス考慮なし</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-2 mt-2">
                                    <button
                                        type="button"
                                        onClick={handleCreateMatchTable}
                                        className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-sm transition-all text-base active:scale-95"
                                    >
                                        対戦表を作成する
                                    </button>

                                    <div className="pt-1 flex justify-start">
                                        <button
                                            type="button"
                                            onClick={handleGoHome}
                                            className="text-slate-500 hover:text-slate-800 font-bold py-1.5 px-1 text-xs transition-colors flex items-center active:scale-95"
                                        >
                                            ←TOPに戻る
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {page === 'match' && (
                            <div className="space-y-3">
                                
                                <div id="match-table-capture-area" className="bg-white px-3 py-3 border border-slate-200 rounded-xl shadow-sm">
                                    <div className="flex justify-between items-end border-b-2 border-slate-800 pb-1 mb-1">
                                        <h2 className="font-bold text-base leading-[1.3] text-slate-800 truncate pr-2 capture-safe-text">
                                            {groupName || "（名称未設定のグループ）"}
                                        </h2>
                                        <span className="text-[10px] text-slate-500 whitespace-nowrap font-bold capture-safe-text">
                                            {dateStr}
                                        </span>
                                    </div>

                                    <div className="flex flex-col">
                                        {currentMatches.map((m, index) => {
                                            const matchNum = matchPage * 10 + index + 1;
                                            const p1 = getMemberName(m.t1[0]);
                                            const p2 = getMemberName(m.t1[1]);
                                            const p3 = getMemberName(m.t2[0]);
                                            const p4 = getMemberName(m.t2[1]);
                                            const absNames = m.absentees.map(id => getMemberName(id));

                                            return (
                                                <div key={m.id} className="border-b border-slate-200 py-2.5 flex flex-col justify-center">
                                                    <div className="flex items-center mb-1.5 w-full">
                                                        <span className="text-xs font-extrabold text-slate-700 w-16 shrink-0 capture-safe-text">
                                                            第{matchNum}試合
                                                        </span>
                                                        {absNames.length > 0 && (
                                                            <span className="text-xs text-slate-500 font-bold flex-1 truncate capture-safe-text">
                                                                休: {absNames.map(a => a.name).join(', ')}
                                                            </span>
                                                        )}
                                                    </div>
                                                
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center justify-center space-x-1 w-[46%]">
                                                            <NameSpan player={p1} />
                                                            <NameSpan player={p2} />
                                                        </div>
                                                        <div className="w-[8%] text-center text-xs text-slate-400 font-bold capture-safe-text">vs</div>
                                                        <div className="flex items-center justify-center space-x-1 w-[46%]">
                                                            <NameSpan player={p3} />
                                                            <NameSpan player={p4} />
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="space-y-3 mt-4">
                                    <div className="flex justify-between items-center px-1">
                                        <button 
                                            type="button"
                                            onClick={() => setMatchPage(p => Math.max(0, p - 1))}
                                            disabled={matchPage === 0}
                                            className={`text-xm font-bold py-1.5 transition-colors ${
                                                matchPage > 0 
                                                ? 'text-slate-600 hover:text-slate-800 cursor-pointer active:scale-95' 
                                                : 'text-slate-300 cursor-not-allowed'
                                            }`}
                                        >
                                            ❮❮ 前の10試合
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={handleNextPageOrGenerate}
                                            className="text-xm font-bold py-1.5 text-slate-600 hover:text-slate-800 transition-colors active:scale-95 cursor-pointer"
                                        >
                                            次の10試合 ❯❯
                                        </button>
                                    </div>
                                    
                                    <button
                                        type="button"
                                        onClick={handleCopyImage}
                                        className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-sm transition-all text-sm flex items-center justify-center active:scale-95"
                                    >
                                        <CopyIcon /> 対戦表を画像でコピー
                                    </button>
                                    
                                    <div className="pt-1 flex justify-start">
                                        <button
                                            type="button"
                                            onClick={handleBackToGroup}
                                            className="text-slate-500 hover:text-slate-800 font-bold py-1.5 px-1 text-xs transition-colors flex items-center active:scale-95"
                                        >
                                            ←設定に戻る
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {showImageModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl relative animate-in fade-in zoom-in duration-200">
                                <div className="text-center space-y-1">
                                    <h3 className="font-extrabold text-lg text-slate-800">
                                        画像が生成されました
                                    </h3>
                                    <p className="text-xs text-slate-500 leading-normal">
                                        ブラウザの制限によりクリップボードへ直接コピーできませんでした。画像を長押しして保存してください。
                                    </p>
                                </div>

                                <div className="border border-slate-200 rounded-xl overflow-hidden shadow-inner max-h-[380px] overflow-y-auto">
                                    <img src={capturedImage} alt="Match Schedule" className="w-full h-auto block" />
                                </div>

                                <div className="flex justify-center">
                                    <button
                                        onClick={() => setShowImageModal(false)}
                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-6 rounded-lg text-xs transition-all w-full"
                                    >
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast.show && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-white font-bold text-xs py-2 px-5 rounded-full shadow-lg whitespace-nowrap">
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        function EmptyRowCreator({ onAddMember, nextNumber }) {
            const [name, setName] = useState("");
            
            const handleTriggerAdd = (gender) => {
                const finalName = name.trim() || `名前${nextNumber}`;
                onAddMember(finalName, gender);
                setName(""); 
            };

            return (
                <div className="flex items-center space-x-1.5 p-1">
                    <div className="w-12 h-6 border border-dashed border-slate-300 rounded shrink-0 flex items-center justify-center">
                        <span className="text-[10px] text-slate-300 font-bold">+</span>
                    </div>
                    
                    <input
                        type="text"
                        value={name}
                        onChange={(e) => { if (e.target.value.length <= 4) setName(e.target.value); }}
                        placeholder={`名前${nextNumber}`}
                        className="flex-grow bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-sm font-bold text-slate-600 px-1"
                    />

                    <div className="flex space-x-1 shrink-0">
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('M')}
                            className="w-7 py-1 text-[10px] font-bold rounded border border-sky-200 text-sky-500 hover:bg-sky-50 transition-all bg-white"
                        >
                            男
                        </button>
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('F')}
                            className="w-7 py-1 text-[10px] font-bold rounded border border-rose-200 text-rose-500 hover:bg-rose-50 transition-all bg-white"
                        >
                            女
                        </button>
                    </div>
                    <div className="w-6 shrink-0"></div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
