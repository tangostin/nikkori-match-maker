<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SettingsIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

                <circle cx="12" cy="12" r="3" />
            </svg>
        );

        const PlusIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <line x1="12" x2="12" y1="5" y2="19" />
                <line x1="5" x2="19" y1="12" y2="12" />
            </svg>
        );

        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
        );

        const HomeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
        );

        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const DEFAULT_GROUPS = [];

        const DEFAULT_PRIORITY = ['count', 'break', 'consecutive', 'pair', 'opponent', 'gender'];
        
        const CRITERIA_MAP = {
            count: '試合数均等',
            break: '連続休憩回避',
            consecutive: '連続試合回避',
            pair: '同一ペア回避',
            opponent: '同一相手回避',
            gender: '男女均等'
        };

        function getPreState(presentMembers, history) {
            const playCounts = {};
            const consecutivePlay = {};
            const consecutiveRest = {};

            presentMembers.forEach(m => {
                playCounts[m.id] = 0;
                consecutivePlay[m.id] = 0;
                consecutiveRest[m.id] = 0;
            });

            // 1. 累積試合数
            history.forEach(m => {
                m.players.forEach(pid => {
                    if (playCounts[pid] !== undefined) {
                        playCounts[pid]++;
                    }
                });
            });

            // 2. 連続試合数、連続休憩数（過去から後ろ向きに走査して計算）
            presentMembers.forEach(m => {
                let isPlayBreak = false;
                let isRestBreak = false;
                for (let i = history.length - 1; i >= 0; i--) {
                    const h = history[i];
                    const played = h.players.includes(m.id);
                    if (played) {
                        isRestBreak = true;
                        if (!isPlayBreak) {
                            consecutivePlay[m.id]++;
                        }
                    } else {
                        isPlayBreak = true;
                        if (!isRestBreak) {
                            consecutiveRest[m.id]++;
                        }
                    }
                    if (isPlayBreak && isRestBreak) break;
                }
            });

            // 3. 過去の同ペア回数を数えるクロージャ
            const pairHistoryCount = (p1Id, p2Id) => {
                let count = 0;
                history.forEach(m => {
                    const inT1 = m.t1.includes(p1Id) && m.t1.includes(p2Id);
                    const inT2 = m.t2.includes(p1Id) && m.t2.includes(p2Id);
                    if (inT1 || inT2) count++;
                });
                return count;
            };

            // 4. 過去の対戦回数を数えるクロージャ
            const opponentHistoryCount = (p1Id, p2Id) => {
                let count = 0;
                history.forEach(m => {
                    const t1HasP1 = m.t1.includes(p1Id);
                    const t1HasP2 = m.t1.includes(p2Id);
                    const t2HasP1 = m.t2.includes(p1Id);
                    const t2HasP2 = m.t2.includes(p2Id);
                    if ((t1HasP1 && t2HasP2) || (t2HasP1 && t1HasP2)) count++;
                });
                return count;
            };

            return { playCounts, consecutivePlay, consecutiveRest, pairHistoryCount, opponentHistoryCount };
        }

        function calculateScore(config, criterion, presentMembers, history, genderMode, preState) {
            const { playCounts, consecutivePlay, consecutiveRest, pairHistoryCount, opponentHistoryCount } = preState;
            const courtIds = new Set(config.players.map(p => p.id));

            if (criterion === 'count') {
                // 試合数バランス (指数評価 2^試合数)
                let sum = 0;
                presentMembers.forEach(m => {
                    const isCourt = courtIds.has(m.id);
                    const nextPlayCount = isCourt ? playCounts[m.id] + 1 : playCounts[m.id];
                    sum += Math.pow(2, nextPlayCount);
                });
                return sum;
            }

            if (criterion === 'break') {
                // 連続休憩の防止 (指数評価 2^連続休憩数)
                let sum = 0;
                presentMembers.forEach(m => {
                    const isCourt = courtIds.has(m.id);
                    const nextConsecutiveRest = isCourt ? 0 : consecutiveRest[m.id] + 1;
                    sum += Math.pow(2, nextConsecutiveRest);
                });
                return sum;
            }

            if (criterion === 'consecutive') {
                // 連続試合の防止 (指数評価 2^連続試合数)
                let sum = 0;
                presentMembers.forEach(m => {
                    const isCourt = courtIds.has(m.id);
                    const nextConsecutivePlay = isCourt ? consecutivePlay[m.id] + 1 : 0;
                    sum += Math.pow(2, nextConsecutivePlay);
                });
                return sum;
            }

            if (criterion === 'pair') {
                // 同ペア回避
                const pair1 = pairHistoryCount(config.t1[0].id, config.t1[1].id);
                const pair2 = pairHistoryCount(config.t2[0].id, config.t2[1].id);
                return pair1 + pair2;
            }

            if (criterion === 'opponent') {
                // 対戦相手回避
                const op1 = opponentHistoryCount(config.t1[0].id, config.t2[0].id);
                const op2 = opponentHistoryCount(config.t1[0].id, config.t2[1].id);
                const op3 = opponentHistoryCount(config.t1[1].id, config.t2[0].id);
                const op4 = opponentHistoryCount(config.t1[1].id, config.t2[1].id);
                return op1 + op2 + op3 + op4;
            }

            if (criterion === 'gender') {
                // 男女構成ペナルティ
                const t1Males = config.t1.filter(p => p.gender === "M").length;
                const t2Males = config.t2.filter(p => p.gender === "M").length;

                const isMixed1 = t1Males === 1; 
                const isMixed2 = t2Males === 1; 
                const isMaleOnly1 = t1Males === 2; 
                const isMaleOnly2 = t2Males === 2; 
                const isFemaleOnly1 = t1Males === 0; 
                const isFemaleOnly2 = t2Males === 0; 

                if ((isMaleOnly1 && isMaleOnly2) || (isFemaleOnly1 && isFemaleOnly2) || (isMixed1 && isMixed2)) {
                    return 0;
                }

                const isOneSideMixed = (isMaleOnly1 && isMixed2) || (isMaleOnly2 && isMixed1) || (isFemaleOnly1 && isMixed2) || (isFemaleOnly2 && isMixed1);
                const isOppositeGender = (isMaleOnly1 && isFemaleOnly2) || (isMaleOnly2 && isFemaleOnly1);

                if (genderMode === 'strict') {
                    if (isOneSideMixed) return 10;
                    if (isOppositeGender) return 20;
                } else if (genderMode === 'moderate') {
                    if (isOneSideMixed) return 0;
                    if (isOppositeGender) return 20;
                } else { // permissive
                    return 0;
                }
                return 0;
            }

            return 0;
        }

        function evaluateAndCreateNextMatch(presentMembers, history, priorityOrder, genderMode) {
            if (presentMembers.length < 4) return null;

            const N = presentMembers.length;
            const configurations = [];

            // 1. 4人の選出及び2ペアの全候補列挙
            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    for (let k = j + 1; k < N; k++) {
                        for (let l = k + 1; l < N; l++) {
                            const p1 = presentMembers[i];
                            const p2 = presentMembers[j];
                            const p3 = presentMembers[k];
                            const p4 = presentMembers[l];

                            configurations.push({ players: [p1, p2, p3, p4], t1: [p1, p2], t2: [p3, p4] });
                            configurations.push({ players: [p1, p3], t1: [p1, p3], t2: [p2, p4] });
                            configurations.push({ players: [p1, p4], t1: [p1, p4], t2: [p2, p3] });
                        }
                    }
                }
            }

            if (history.length === 0) {
                const chosen = configurations[Math.floor(Math.random() * configurations.length)];
                const chosenCourtIds = new Set(chosen.players.map(p => p.id));
                const chosenAbsentees = presentMembers.filter(m => !chosenCourtIds.has(m.id));

                return {
                    id: `match-1`,
                    players: chosen.players.map(p => p.id),
                    t1: chosen.t1.map(p => p.id),
                    t2: chosen.t2.map(p => p.id),
                    absentees: chosenAbsentees.map(p => p.id)
                };
            }

            const preState = getPreState(presentMembers, history);
            let candidates = [...configurations];

            for (const criterion of priorityOrder) {
                const scores = candidates.map(config => {
                    return calculateScore(config, criterion, presentMembers, history, genderMode, preState);
                });

                const minScore = Math.min(...scores);
                candidates = candidates.filter((_, idx) => scores[idx] === minScore);

                if (candidates.length === 1) {
                    break;
                }
            }

            const chosen = candidates[Math.floor(Math.random() * candidates.length)];
            if (!chosen) return null;

            const chosenCourtIds = new Set(chosen.players.map(p => p.id));
            const chosenAbsentees = presentMembers.filter(m => !chosenCourtIds.has(m.id));

            return {
                id: `match-${history.length + 1}`,
                players: chosen.players.map(p => p.id),
                t1: chosen.t1.map(p => p.id),
                t2: chosen.t2.map(p => p.id),
                absentees: chosenAbsentees.map(p => p.id)
            };
        }

        function App() {
            const [page, setPage] = useState('top');
            const [groups, setGroups] = useState([]);
            const [activeGroupId, setActiveGroupId] = useState(null);
            
            const [groupName, setGroupName] = useState('');
            const [members, setMembers] = useState([]);
            
            const [priorityOrder, setPriorityOrder] = useState(DEFAULT_PRIORITY);
            const [genderMode, setGenderMode] = useState('moderate');

            const [showSettings, setShowSettings] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            const [matchList, setMatchList] = useState([]);
            const [currentMatchPage, setCurrentMatchPage] = useState(0); // ページネーション用 (10試合ずつ)
            
            const [toast, setToast] = useState({ show: false, message: "" });
            const [capturedImage, setCapturedImage] = useState(null);
            const [showImageModal, setShowImageModal] = useState(false);

            useEffect(() => {
                const stored = localStorage.getItem('nikkori_tennis_groups');
                if (stored) {
                    try {
                        setGroups(JSON.parse(stored));
                    } catch (e) {
                        setGroups(DEFAULT_GROUPS);
                    }
                } else {
                    setGroups(DEFAULT_GROUPS);
                }
            }, []);

            const triggerToast = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: "" }), 2500);
            };

            const handleGoHome = () => {
                setPage('top');
                setActiveGroupId(null);
                setShowSettings(false);
                setShowDeleteConfirm(false);
            };
            
            const handleBackToGroup = () => {
                setPage('group');
            };

            const handleCreateNewGroup = () => {
                const newId = `group-${Date.now()}`;
                const newGroup = {
                    id: newId,
                    name: "",
                    members: [],
                    settings: {
                        priorityOrder: DEFAULT_PRIORITY,
                        genderMode: 'moderate'
                    }
                };
                const updated = [...groups, newGroup];
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updated));
                
                setActiveGroupId(newId);
                setGroupName("");
                setMembers([]);
                setPriorityOrder(newGroup.settings.priorityOrder);
                setGenderMode(newGroup.settings.genderMode);
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSelectGroup = (gId) => {
                const target = groups.find(g => g.id === gId);
                if (!target) return;
                setActiveGroupId(gId);
                setGroupName(target.name);
                setMembers(target.members || []);
                
                setPriorityOrder(target.settings?.priorityOrder || DEFAULT_PRIORITY);
                setGenderMode(target.settings?.genderMode || 'moderate');
                
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSaveGroup = () => {
                const resolvedName = groupName.trim() || "（名称未設定のグループ）";
                const cleanMembers = members.filter(m => m.name.trim() !== "");

                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return { 
                            ...g, 
                            name: resolvedName, 
                            members: cleanMembers, 
                            settings: { priorityOrder, genderMode } 
                        };
                    }
                    return g;
                });
                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updatedGroups));
                triggerToast("💾 保存しました");
            };

            const handleDeleteGroup = () => {
                const updated = groups.filter(g => g.id !== activeGroupId);
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updated));
                handleGoHome();
            };

            const updateMemberName = (index, newName) => {
                if (newName.length > 4) return;
                const isDuplicate = members.some((m, i) => i !== index && m.name === newName && newName !== "");
                if (isDuplicate) {
                    triggerToast("⚠️ 同じメンバー名は使えません");
                    return; 
                }
                const copy = [...members];
                copy[index].name = newName;
                setMembers(copy);
            };

            const toggleMemberGender = (index, gender) => {
                const copy = [...members];
                copy[index].gender = gender;
                setMembers(copy);
            };

            const toggleMemberPresence = (index) => {
                const copy = [...members];
                const isCurrentlyPresent = copy[index].present;

                // 参加しようとした場合、現在の参加人数をチェック
                if (!isCurrentlyPresent) {
                    const presentCount = copy.filter(m => m.present).length;
                    if (presentCount >= 12) {
                        triggerToast("⚠️ 参加者は最大12名までです");
                        return; // 13人目の参加をブロック
                    }
                }

                copy[index].present = !isCurrentlyPresent;
                setMembers(copy);
            };

            const deleteMember = (index) => {
                const copy = [...members];
                copy.splice(index, 1);
                setMembers(copy);
            };

            const handleAddMember = (name, gender) => {
                if (members.length >= 100) {
                    triggerToast("⚠️ メンバー登録は最大100名までです");
                    return;
                }
                if (members.some(m => m.name === name)) {
                    triggerToast("⚠️ 同じメンバー名は使えません");
                    return;
                }
                const newM = {
                    id: `member-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    name: name.slice(0, 4),
                    gender: gender,
                    present: true
                };
                
                // 参加者上限チェック
                const presentCount = members.filter(m => m.present).length;
                if (presentCount >= 12) {
                    newM.present = false; // 既に12人いる場合は不参加状態で追加
                    triggerToast("参加者が12名に達しているため、不参加状態で追加しました");
                }
                
                setMembers([...members, newM]);
            };

            const movePriority = (index, direction) => {
                const newOrder = [...priorityOrder];
                const targetIdx = index + direction;
                if (targetIdx < 0 || targetIdx >= newOrder.length) return;

                const temp = newOrder[index];
                newOrder[index] = newOrder[targetIdx];
                newOrder[targetIdx] = temp;

                setPriorityOrder(newOrder);
            };

            const handleCreateMatchTable = () => {
                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);

                if (activeAttendees.length < 4) {
                    triggerToast("⚠️ 試合を行うには参加者が最低4人必要です");
                    return;
                }

                const resolvedName = groupName.trim() || "（名称未設定のグループ）";
                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return { 
                            ...g, 
                            name: resolvedName, 
                            members: cleanMembers, 
                            settings: { priorityOrder, genderMode } 
                        };
                    }
                    return g;
                });
                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updatedGroups));

                const generated = [];
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, generated, priorityOrder, genderMode);
                    if (nextMatch) generated.push(nextMatch);
                    else break;
                }

                setMatchList(generated);
                setCurrentMatchPage(0); // 1ページ目（0-indexed）から表示
                setPage('match');
            };

            const handleNextMatches = () => {
                const nextPage = currentMatchPage + 1;
                
                // 次のページが既に生成済みかチェック
                if (nextPage * 10 < matchList.length) {
                    setCurrentMatchPage(nextPage);
                } else {
                    // 足りない場合は新たに10試合生成して追加
                    const cleanMembers = members.filter(m => m.name.trim() !== "");
                    const activeAttendees = cleanMembers.filter(m => m.present);
                    if (activeAttendees.length < 4) return;

                    const nextTen = [];
                    for (let i = 0; i < 10; i++) {
                        const nextMatch = evaluateAndCreateNextMatch(activeAttendees, [...matchList, ...nextTen], priorityOrder, genderMode);
                        if (nextMatch) nextTen.push(nextMatch);
                        else break;
                    }

                    if (nextTen.length === 0) {
                        triggerToast("⚠️ これ以上組み合わせを作れません");
                        return;
                    }
                    setMatchList([...matchList, ...nextTen]);
                    setCurrentMatchPage(nextPage);
                }
            };

            const handlePrevMatches = () => {
                if (currentMatchPage > 0) {
                    setCurrentMatchPage(currentMatchPage - 1);
                }
            };

            const handleCopyImage = async () => {
                const element = document.getElementById('match-table-capture-area');
                if (!element) return;
                
                triggerToast("⏳ コピー中...");
                
                try {
                    const canvas = await html2canvas(element, {
                        scale: 2, 
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        logging: false,
                        windowWidth: element.scrollWidth,
                        windowHeight: element.scrollHeight
                    });

                    canvas.toBlob(async (blob) => {
                        try {
                            const item = new ClipboardItem({ "image/png": blob });
                            await navigator.clipboard.write([item]);
                            triggerToast("✅ コピー完了");
                        } catch (err) {
                            console.error("Clipboard API error:", err);
                            const imgData = URL.createObjectURL(blob);
                            setCapturedImage(imgData);
                            setShowImageModal(true);
                            triggerToast("⚠️ コピーに失敗しました。画像を手動で保存してください。");
                        }
                    }, 'image/png');
                } catch (e) {
                    console.error(e);
                    triggerToast("⚠️ 画像の生成に失敗しました");
                }
            };

            const getMemberName = (id) => {
                const m = members.find(p => p.id === id);
                if (!m) return { name: "??", isMale: true };
                return { name: m.name, isMale: m.gender === "M" };
            };

            const NameSpan = ({ player }) => {
                const len = player.name.length;
                const textSize = len >= 4 ? 'text-[11px]' : 'text-sm';
                const bgColor = player.isMale ? 'bg-sky-50 text-sky-700' : 'bg-rose-50 text-rose-700';
                
                return (
                    <span className={`w-full text-center font-bold py-1 rounded ${bgColor} ${textSize} inline-block whitespace-nowrap overflow-visible capture-safe-text`}>
                        {player.name}
                    </span>
                );
            };

            // 日付の取得処理
            const today = new Date();
            const dateString = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
            
            // ページに表示する試合リストの切り出し
            const displayedMatches = matchList.slice(currentMatchPage * 10, (currentMatchPage + 1) * 10);
            const startIndex = currentMatchPage * 10;

            const presentCount = members.filter(m => m.present).length;

            return (
                <div className="flex-grow flex flex-col justify-between">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center space-x-1 cursor-pointer" onClick={handleGoHome}>
                                <span className="font-extrabold text-lg tracking-tight text-slate-800">
                                    にっこり対戦表
                                </span>
                            </div>
                            {page !== 'top' && (
                                <button 
                                    onClick={handleGoHome}
                                    className="text-xs font-bold bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full flex items-center shadow-sm active:scale-95 transition-all"
                                >
                                    <HomeIcon /> TOPへ戻る
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="flex-grow max-w-md w-full mx-auto px-4 py-5 pb-10">
                        
                        {page === 'top' && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-6 text-white shadow-md text-center">
                                    <h2 className="text-xl font-black mb-1">にっこり対戦表メーカー</h2>
                                    <p className="text-emerald-50 text-xs">簡単な操作でダブルスの最適な対戦表を作成</p>
                                </div>

                                <div className="space-y-2">
                                    {groups.length === 0 ? (
                                        <div className="text-center py-8 bg-white border border-dashed border-slate-200 rounded-xl text-slate-400 text-sm">
                                            グループがありません。<br/>下のボタンから作成してください。
                                        </div>
                                    ) : (
                                        groups.map(g => (
                                            <button
                                                key={g.id}
                                                onClick={() => handleSelectGroup(g.id)}
                                                className="w-full text-left bg-white border border-slate-100 hover:border-emerald-300 rounded-xl p-4 shadow-sm transition-all flex items-center justify-between group active:scale-[0.99]"
                                            >
                                                <div className="space-y-1">
                                                    <div className="font-bold text-slate-800 group-hover:text-emerald-600">
                                                        {g.name || "（名称未設定のグループ）"}
                                                    </div>
                                                    <div className="text-xs text-slate-400">
                                                        メンバー: {g.members?.length || 0}名
                                                    </div>
                                                </div>
                                                <span className="text-slate-300 group-hover:text-emerald-500">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                                                </span>
                                            </button>
                                        ))
                                    )}
                                </div>

                                <button
                                    onClick={handleCreateNewGroup}
                                    className="w-full bg-slate-800 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow transition-all flex items-center justify-center space-x-2"
                                >
                                    <PlusIcon /><span>新規グループを作成する</span>
                                </button>
                            </div>
                        )}

                        {page === 'group' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                                    <label className="text-[10px] font-bold text-slate-400 block mb-1">グループ名</label>
                                    <input
                                        type="text"
                                        value={groupName}
                                        onChange={(e) => setGroupName(e.target.value)}
                                        placeholder="グループ名を入力"
                                        className="w-full font-bold text-lg border-b border-slate-200 focus:border-emerald-500 outline-none py-1 transition-colors"
                                    />
                                </div>

                                <div className="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm space-y-1">
                                    <div className="mb-2 px-1 text-[10px] text-slate-500 font-bold bg-slate-50 py-1.5 rounded">
                                        💡 名前（4文字以内）を入力して、性別を選択してください。
                                    </div>
                                    <div className="flex justify-end items-center mb-1 px-1">
                                        <span className="text-[10px] text-slate-500 font-bold">
                                            登録 {members.length}名 ／ 参加 <span className="text-emerald-600">{presentCount}名</span> （最大参加12名）
                                        </span>
                                    </div>
                                    
                                    <div className="space-y-1.5 pb-2">
                                        {members.map((m, index) => (
                                            <div key={m.id} className="flex items-center space-x-1.5 p-1 border-b border-slate-50">
                                                <button
                                                    onClick={() => toggleMemberPresence(index)}
                                                    className={`w-12 py-1 text-[10px] font-bold rounded shadow-sm transition-all shrink-0 ${
                                                        m.present 
                                                        ? 'bg-emerald-500 text-white' 
                                                        : 'bg-slate-200 text-slate-500'
                                                    }`}
                                                >
                                                    {m.present ? '参加' : '不参加'}
                                                </button>

                                                <input
                                                    type="text"
                                                    value={m.name}
                                                    onChange={(e) => updateMemberName(index, e.target.value)}
                                                    maxLength={4}
                                                    className={`flex-grow bg-transparent border-none focus:ring-0 outline-none text-sm font-bold px-1 ${!m.present && 'text-slate-400'}`}
                                                />

                                                <div className="flex space-x-1 shrink-0">
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleMemberGender(index, 'M')}
                                                        className={`w-7 py-1 text-[10px] font-bold rounded transition-all ${
                                                            m.gender === 'M'
                                                            ? 'bg-sky-500 text-white shadow-sm'
                                                            : 'bg-white text-slate-400 border border-slate-200'
                                                        }`}
                                                    >
                                                        男
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleMemberGender(index, 'F')}
                                                        className={`w-7 py-1 text-[10px] font-bold rounded transition-all ${
                                                            m.gender === 'F'
                                                            ? 'bg-rose-500 text-white shadow-sm'
                                                            : 'bg-white text-slate-400 border border-slate-200'
                                                        }`}
                                                    >
                                                        女
                                                    </button>
                                                </div>

                                                <button onClick={() => deleteMember(index)} className="p-1 text-slate-300 hover:text-rose-500 shrink-0">
                                                    <TrashIcon />
                                                </button>
                                            </div>
                                        ))}

                                        {members.length < 100 ? (
                                            <EmptyRowCreator onAddMember={handleAddMember} nextNumber={members.length + 1} />
                                        ) : (
                                            <div className="text-center text-[10px] text-slate-400 py-2 font-bold bg-slate-50 rounded-lg">
                                                メンバー登録数は最大100名です
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm relative">
                                    <button
                                        type="button"
                                        onClick={() => setShowSettings(!showSettings)}
                                        className="flex items-center text-xs font-bold text-slate-600 focus:outline-none"
                                    >
                                        <SettingsIcon className="mr-1" />
                                        詳細設定
                                        <span className={`ml-1 transform transition-transform ${showSettings ? 'rotate-180' : ''}`}>▼</span>
                                    </button>
                                    
                                    <div className="absolute top-2.5 right-3">
                                        <button
                                            type="button"
                                            onClick={handleSaveGroup}
                                            className="bg-slate-500 hover:bg-slate-600 text-white font-bold py-1 px-4 rounded-lg shadow-sm text-xs transition-colors"
                                        >
                                            保存
                                        </button>
                                    </div>

                                    {showSettings && (
                                        <div className="pt-4 space-y-4 mt-2 border-t border-slate-100 animate-in fade-in duration-200">
                                            {/* 優先順位リスト並び替えUI */}
                                            <div>
                                                <span className="text-[11px] font-bold text-slate-500 block mb-2">組み合わせの優先順位</span>
                                                <div className="space-y-0.5">
                                                    {priorityOrder.map((key, idx) => (
                                                        <div key={key} className="flex items-center justify-between px-1 py-1.5 border-b border-slate-100">
                                                            <span className="text-xs font-bold text-slate-700">
                                                                {CRITERIA_MAP[key]}
                                                            </span>
                                                            <div className="flex space-x-1 shrink-0">
                                                                <button
                                                                    type="button"
                                                                    disabled={idx === 0}
                                                                    onClick={() => movePriority(idx, -1)}
                                                                    className={`w-6 h-6 flex items-center justify-center rounded text-[10px] font-bold transition-colors ${idx === 0 ? 'text-slate-200' : 'text-slate-500 bg-slate-100 hover:bg-slate-200'}`}
                                                                >
                                                                    ▲
                                                                </button>
                                                                <button
                                                                    type="button"
                                                                    disabled={idx === priorityOrder.length - 1}
                                                                    onClick={() => movePriority(idx, 1)}
                                                                    className={`w-6 h-6 flex items-center justify-center rounded text-[10px] font-bold transition-colors ${idx === priorityOrder.length - 1 ? 'text-slate-200' : 'text-slate-500 bg-slate-100 hover:bg-slate-200'}`}
                                                                >
                                                                    ▼
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="text-right mt-2">
                                                    <button
                                                        type="button"
                                                        onClick={() => setPriorityOrder(DEFAULT_PRIORITY)}
                                                        className="text-[10px] text-slate-400 hover:text-slate-600 underline focus:outline-none"
                                                    >
                                                        初期設定に戻す
                                                    </button>
                                                </div>
                                            </div>

                                            {/* 男女構成設定UI */}
                                            <div className="pt-3 border-t border-slate-100">
                                                <span className="text-[11px] font-bold text-slate-500 block mb-2">男女設定詳細</span>
                                                <div className="flex flex-col space-y-1">
                                                    {[
                                                        { key: 'strict', label: '男女差を許容しない' },
                                                        { key: 'moderate', label: '男女差をやや許容（推奨）' },
                                                        { key: 'permissive', label: '男女差を許容' }
                                                    ].map(item => (
                                                        <label key={item.key} className="flex items-center space-x-2 py-1.5 px-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors">
                                                            <input
                                                                type="radio"
                                                                name="genderMode"
                                                                checked={genderMode === item.key}
                                                                onChange={() => setGenderMode(item.key)}
                                                                className="text-emerald-500 focus:ring-emerald-400 w-4 h-4"
                                                            />
                                                            <span className="text-xs font-bold text-slate-700">{item.label}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button
                                    type="button"
                                    onClick={handleCreateMatchTable}
                                    className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-sm transition-all text-base mt-2"
                                >
                                    対戦表作成
                                </button>

                                <div className="mt-8 text-center pb-4">
                                    {!showDeleteConfirm ? (
                                        <button onClick={() => setShowDeleteConfirm(true)} className="text-[11px] font-bold text-rose-400">
                                            グループを削除
                                        </button>
                                    ) : (
                                        <div className="bg-rose-50 rounded-xl p-3 inline-block">
                                            <p className="text-[10px] font-bold text-rose-700 mb-2">削除しますか？</p>
                                            <div className="flex space-x-2">
                                                <button onClick={() => setShowDeleteConfirm(false)} className="bg-white text-slate-600 border border-slate-200 px-3 py-1 rounded text-[10px] font-bold">キャンセル</button>
                                                <button onClick={handleDeleteGroup} className="bg-rose-500 text-white px-3 py-1 rounded text-[10px] font-bold">削除する</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {page === 'match' && (
                            <div className="space-y-3">
                                
                                <div id="match-table-capture-area" className="bg-white px-4 py-3 border border-slate-200 rounded-xl">
                                    <div className="flex justify-between items-baseline border-b-2 border-slate-800 pb-1.5 mb-2">
                                        <h2 className="font-bold text-base text-slate-800 truncate pr-2 capture-safe-text">
                                            {groupName || "（名称未設定のグループ）"}
                                        </h2>
                                        <span className="text-[10px] text-slate-500 whitespace-nowrap font-bold capture-safe-text">
                                            {dateString}
                                        </span>
                                    </div>

                                    <div className="flex flex-col">
                                        {displayedMatches.map((m, index) => {
                                            const p1 = getMemberName(m.t1[0]);
                                            const p2 = getMemberName(m.t1[1]);
                                            const p3 = getMemberName(m.t2[0]);
                                            const p4 = getMemberName(m.t2[1]);
                                            const absNames = m.absentees.map(id => getMemberName(id));

                                            return (
                                                <div key={m.id} className="border-b border-slate-200 py-2 flex flex-col justify-center">
                                                    <div className="flex items-center mb-1.5 w-full">
                                                        <span className="text-[11px] font-extrabold text-slate-700 w-12 shrink-0 capture-safe-text">
                                                            第{startIndex + index + 1}試合
                                                        </span>
                                                        {absNames.length > 0 && (
                                                            <span className="text-[10px] text-slate-500 capture-safe-text">
                                                                休: {absNames.map(a => a.name).join(', ')}
                                                            </span>
                                                        )}
                                                    </div>
                                                    
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center justify-center space-x-1 w-[46%]">
                                                            <div className="flex-1 min-w-0"><NameSpan player={p1} /></div>
                                                            <div className="flex-1 min-w-0"><NameSpan player={p2} /></div>
                                                        </div>
                                                        <div className="w-[8%] text-center text-[10px] text-slate-400 font-bold capture-safe-text">vs</div>
                                                        <div className="flex items-center justify-center space-x-1 w-[46%]">
                                                            <div className="flex-1 min-w-0"><NameSpan player={p3} /></div>
                                                            <div className="flex-1 min-w-0"><NameSpan player={p4} /></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="flex justify-between items-center mt-1 px-1">
                                    <div className="w-1/3 text-left">
                                        {currentMatchPage > 0 ? (
                                            <button onClick={handlePrevMatches} className="text-emerald-600 font-bold text-xs py-2 hover:text-emerald-700 transition-colors">
                                                &lt; 前の10試合
                                            </button>
                                        ) : <div></div>}
                                    </div>
                                    <div className="w-1/3 text-center text-[10px] text-slate-400 font-bold">
                                        {startIndex + 1} - {startIndex + displayedMatches.length} 試合
                                    </div>
                                    <div className="w-1/3 text-right">
                                        <button onClick={handleNextMatches} className="text-emerald-600 font-bold text-xs py-2 hover:text-emerald-700 transition-colors">
                                            次の10試合 &gt;
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2 mt-4 pt-2 border-t border-slate-200">
                                    <button
                                        type="button"
                                        onClick={handleCopyImage}
                                        className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl shadow-sm transition-all text-sm flex items-center justify-center"
                                    >
                                        <CopyIcon /> 対戦表を画像コピー
                                    </button>
                                    
                                    <button
                                        type="button"
                                        onClick={handleBackToGroup}
                                        className="w-full text-slate-400 hover:text-slate-500 font-bold py-2 text-xs transition-colors mt-2"
                                    >
                                        設定画面に戻る
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {showImageModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl relative animate-in fade-in zoom-in duration-200">
                                <div className="text-center space-y-1">
                                    <h3 className="font-extrabold text-lg text-slate-800">
                                        画像が生成されました
                                    </h3>
                                    <p className="text-xs text-slate-500 leading-normal">
                                        ブラウザの制限によりクリップボードへ直接コピーできませんでした。画像を長押しして保存してください。
                                    </p>
                                </div>

                                <div className="border border-slate-200 rounded-xl overflow-hidden shadow-inner max-h-[380px] overflow-y-auto">
                                    <img src={capturedImage} alt="Match Schedule" className="w-full h-auto block" />
                                </div>

                                <div className="flex justify-center">
                                    <button
                                        onClick={() => setShowImageModal(false)}
                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-6 rounded-lg text-xs transition-all w-full"
                                    >
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast.show && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-white font-bold text-xs py-2 px-5 rounded-full shadow-lg whitespace-nowrap">
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        function EmptyRowCreator({ onAddMember, nextNumber }) {
            const [name, setName] = useState("");
            
            const handleTriggerAdd = (gender) => {
                const finalName = name.trim() || `名前${nextNumber}`;
                onAddMember(finalName, gender);
                setName(""); 
            };

            return (
                <div className="flex items-center space-x-1.5 p-1">
                    <div className="w-12 h-6 border border-dashed border-slate-300 rounded shrink-0 flex items-center justify-center">
                        <span className="text-[10px] text-slate-300 font-bold">+</span>
                    </div>
                    
                    <input
                        type="text"
                        value={name}
                        onChange={(e) => { if (e.target.value.length <= 4) setName(e.target.value); }}
                        placeholder={`名前${nextNumber}`}
                        className="flex-grow bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-sm font-bold text-slate-600 px-1"
                    />

                    <div className="flex space-x-1 shrink-0">
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('M')}
                            className="w-7 py-1 text-[10px] font-bold rounded border border-sky-200 text-sky-500 hover:bg-sky-50 transition-all bg-white"
                        >
                            男
                        </button>
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('F')}
                            className="w-7 py-1 text-[10px] font-bold rounded border border-rose-200 text-rose-500 hover:bg-rose-50 transition-all bg-white"
                        >
                            女
                        </button>
                    </div>
                    <div className="w-6 shrink-0"></div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
