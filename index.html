        const CalendarIcon = () => (

        const ImageIcon = () => (

        const ChevronLeftIcon = () => (

        const ChevronRightIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block ml-1">

        const DEFAULT_GROUPS = [
            {
                id: "group-1",
                name: "月曜テニスサークル",
                members: [
                    { id: "m1", name: "佐藤", gender: "M", present: true },
                    { id: "m2", name: "鈴木", gender: "M", present: true },
                    { id: "m3", name: "高橋", gender: "M", present: true },
                    { id: "m4", name: "田中", gender: "M", present: true },
                    { id: "m5", name: "渡辺", gender: "M", present: true },
                    { id: "m6", name: "伊藤", gender: "F", present: true },
                    { id: "m7", name: "山本", gender: "F", present: true },
                    { id: "m8", name: "中村", gender: "F", present: true },
                    { id: "m9", name: "小林", gender: "F", present: true }
                ],
                settings: {
                    weights: {
                        count: 10,
                        break: 10,
                        consecutive: 10,
                        pair: 10,
                        opponent: 10,
                        genderMix: 10
                    }
                }
            }
        ];

        // Format name to support line breaks (3 chars per line, max 6 chars total)
        const formatName = (name) => {
            if (!name) return "";
            if (name.length <= 3) return name;
            return name.slice(0, 3) + "\n" + name.slice(3);
        };

        function evaluateAndCreateNextMatch(presentMembers, history, weights) {
            if (presentMembers.length < 4) return null;

            const N = presentMembers.length;
            const configurations = [];

            // Generate possible player groupings of 4 players
            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    for (let k = j + 1; k < N; k++) {
                        for (let l = k + 1; l < N; l++) {
                            const p1 = presentMembers[i];
                            const p2 = presentMembers[j];
                            const p3 = presentMembers[k];
                            const p4 = presentMembers[l];

                            // 3 possible matchups for 4 players
                            configurations.push({ players: [p1, p2, p3, p4], t1: [p1, p2], t2: [p3, p4] });
                            configurations.push({ players: [p1, p3], t1: [p1, p3], t2: [p2, p4] });
                            configurations.push({ players: [p1, p4], t1: [p1, p4], t2: [p2, p3] });
                        }
                    }
                }
            }

            const playCounts = {};
            presentMembers.forEach(m => playCounts[m.id] = 0);
            history.forEach(m => {
                m.players.forEach(pid => {
                    if (playCounts[pid] !== undefined) playCounts[pid]++;
                });
            });

            const pairMatrix = {};
            const opponentMatrix = {};
            presentMembers.forEach(m1 => {
                pairMatrix[m1.id] = {};
                opponentMatrix[m1.id] = {};
                presentMembers.forEach(m2 => {
                    pairMatrix[m1.id][m2.id] = 0;
                    opponentMatrix[m1.id][m2.id] = 0;
                });
            });

            history.forEach(m => {
                const t1 = m.t1;
                const t2 = m.t2;
                if (t1.length === 2 && pairMatrix[t1[0]] && pairMatrix[t1[0]][t1[1]] !== undefined) {
                    pairMatrix[t1[0]][t1[1]]++;
                    pairMatrix[t1[1]][t1[0]]++;
                }
                if (t2.length === 2 && pairMatrix[t2[0]] && pairMatrix[t2[0]][t2[1]] !== undefined) {
                    pairMatrix[t2[0]][t2[1]]++;
                    pairMatrix[t2[1]][t2[0]]++;
                }
                t1.forEach(p1 => {
                    t2.forEach(p2 => {
                        if (opponentMatrix[p1] && opponentMatrix[p1][p2] !== undefined) {
                            opponentMatrix[p1][p2]++;
                            opponentMatrix[p2][p1]++;
                        }
                    });
                });
            });

            let bestConfigs = [];
            let minPenalty = Infinity;

            configurations.forEach(config => {
                const courtIds = new Set(config.players.map(p => p.id));
                const absentees = presentMembers.filter(m => !courtIds.has(m.id));

                let penalty = 0;

                // 1. Equalizing Play counts
                const simulatedCounts = { ...playCounts };
                config.players.forEach(p => simulatedCounts[p.id]++);
                const countsArray = Object.values(simulatedCounts);
                const maxPlay = Math.max(...countsArray);
                const minPlay = Math.min(...countsArray);
                const playGap = maxPlay - minPlay;
                penalty += playGap * playGap * (weights.count * 150);

                const courtPlaySum = config.players.reduce((sum, p) => sum + playCounts[p.id], 0) / 4;
                const outPlaySum = absentees.reduce((sum, p) => sum + playCounts[p.id], 0) / (absentees.length || 1);
                if (courtPlaySum > outPlaySum + 0.5) {
                    penalty += (courtPlaySum - outPlaySum) * weights.count * 200;
                }

                // 2. Sitting out consecutive matches
                if (history.length > 0) {
                    const lastMatch = history[history.length - 1];
                    const lastAbsentees = new Set(lastMatch.absentees);
                    
                    absentees.forEach(m => {
                        if (lastAbsentees.has(m.id)) {
                            penalty += weights.break * 250;
                            if (history.length > 1) {
                                const secondLastMatch = history[history.length - 2];
                                if (secondLastMatch.absentees.includes(m.id)) {
                                    penalty += weights.break * 800;
                                }
                            }
                        }
                    });
                }

                // 3. Consecutive plays fatigue
                config.players.forEach(p => {
                    let continuousCount = 0;
                    for (let i = history.length - 1; i >= 0; i--) {
                        if (history[i].players.includes(p.id)) {
                            continuousCount++;
                        } else {
                            break;
                        }
                    }
                    if (continuousCount >= 2) {
                        penalty += (continuousCount - 1) * weights.consecutive * 40;
                    }
                });

                // 4. Balanced partnerships
                const pair1Cost = pairMatrix[config.t1[0].id][config.t1[1].id];
                const pair2Cost = pairMatrix[config.t2[0].id][config.t2[1].id];
                penalty += (pair1Cost * pair1Cost) * weights.pair * 200;
                penalty += (pair2Cost * pair2Cost) * weights.pair * 200;

                // 5. Opponent rotation
                let oppCost = 0;
                const oppPairs = [
                    [config.t1[0].id, config.t2[0].id],
                    [config.t1[0].id, config.t2[1].id],
                    [config.t1[1].id, config.t2[0].id],
                    [config.t1[1].id, config.t2[1].id]
                ];
                oppPairs.forEach(([pa, pb]) => {
                    oppCost += opponentMatrix[pa][pb];
                });
                penalty += (oppCost * oppCost) * weights.opponent * 40;

                // 6. Gender mix balance
                const malesOnCourt = config.players.filter(p => p.gender === "M").length;
                const femalesOnCourt = 4 - malesOnCourt;

                if (malesOnCourt === 2 && femalesOnCourt === 2) {
                    const t1Genders = config.t1.map(p => p.gender);
                    const isMixedDouble = t1Genders.includes("M") && t1Genders.includes("F");
                    if (!isMixedDouble) {
                        penalty += weights.genderMix * 50;
                    }
                } else if (malesOnCourt === 3 || femalesOnCourt === 3) {
                    penalty += weights.genderMix * 120;
                }

                if (penalty < minPenalty) {
                    minPenalty = penalty;
                    bestConfigs = [config];
                } else if (penalty === minPenalty) {
                    bestConfigs.push(config);
                }
            });

            const chosen = bestConfigs[Math.floor(Math.random() * bestConfigs.length)];
            if (!chosen) return null;

            const chosenCourtIds = new Set(chosen.players.map(p => p.id));
            const chosenAbsentees = presentMembers.filter(m => !chosenCourtIds.has(m.id));

            return {
                id: `match-${history.length + 1}`,
                players: chosen.players.map(p => p.id),
                t1: chosen.t1.map(p => p.id),
                t2: chosen.t2.map(p => p.id),
                absentees: chosenAbsentees.map(p => p.id)
            };
        }

        function App() {
            const [page, setPage] = useState('top');
            const [groups, setGroups] = useState([]);
            const [activeGroupId, setActiveGroupId] = useState(null);
            
            // Temporary editing states
            const [groupName, setGroupName] = useState('');
            const [members, setMembers] = useState([]);
            const [weights, setWeights] = useState({
                count: 10,
                break: 10,
                consecutive: 10,
                pair: 10,
                opponent: 10,
                genderMix: 10
            });
            const [showSettings, setShowSettings] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            // Match Table & Pagination States
            const [matchList, setMatchList] = useState([]);
            const [currentPage, setCurrentPage] = useState(1);
            const matchesPerPage = 10;

            const [toast, setToast] = useState({ show: false, message: "" });
            const [capturedImage, setCapturedImage] = useState(null);
            const [showImageModal, setShowImageModal] = useState(false);

            useEffect(() => {
                const stored = localStorage.getItem('nikkori_tennis_groups');
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        setGroups(parsed);
                    } catch (e) {
                        setGroups(DEFAULT_GROUPS);
                        localStorage.setItem('nikkori_tennis_groups', JSON.stringify(DEFAULT_GROUPS));
                    }
                } else {
                    setGroups(DEFAULT_GROUPS);
                    localStorage.setItem('nikkori_tennis_groups', JSON.stringify(DEFAULT_GROUPS));
                }
            }, []);

            const triggerToast = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: "" }), 2500);
            };

            const handleGoHome = () => {
                setPage('top');
                setActiveGroupId(null);
                setShowSettings(false);
                setShowDeleteConfirm(false);
            };

            const handleCreateNewGroup = () => {
                const newId = `group-${Date.now()}`;
                const newGroup = {
                    id: newId,
                    name: "",
                    members: [],
                    settings: {
                        weights: {
                            count: 10,
                            break: 10,
                            consecutive: 10,
                            pair: 10,
                            opponent: 10,
                            genderMix: 10
                        }
                    }
                };
                
                const updated = [...groups, newGroup];
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updated));
                
                setActiveGroupId(newId);
                setGroupName("");
                setMembers([]);
                setWeights({ count: 10, break: 10, consecutive: 10, pair: 10, opponent: 10, genderMix: 10 });
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSelectGroup = (gId) => {
                const target = groups.find(g => g.id === gId);
                if (!target) return;
                setActiveGroupId(gId);
                setGroupName(target.name);
                setMembers(target.members || []);
                setWeights(target.settings?.weights || { count: 10, break: 10, consecutive: 10, pair: 10, opponent: 10, genderMix: 10 });
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSaveGroup = () => {
                const resolvedName = groupName.trim() || "無題のグループ";
                const cleanMembers = members.filter(m => m.name.trim() !== "");

                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return {
                            ...g,
                            name: resolvedName,
                            members: cleanMembers,
                            settings: { weights }
                        };
                    }
                    return g;
                });

                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updatedGroups));
                triggerToast("💾 設定を保存しました！");
            };

            const handleDeleteGroup = () => {
                const updated = groups.filter(g => g.id !== activeGroupId);
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updated));
                triggerToast("🗑️ グループを削除しました");
                handleGoHome();
            };

            const updateMemberName = (index, newName) => {
                if (newName.length > 6) return;
                const copy = [...members];
                copy[index].name = newName;
                setMembers(copy);
            };

            const toggleMemberGender = (index, gender) => {
                const copy = [...members];
                copy[index].gender = gender;
                setMembers(copy);
            };

            const toggleMemberPresence = (index) => {
                const copy = [...members];
                copy[index].present = !copy[index].present;
                setMembers(copy);
            };

            const deleteMember = (index) => {
                const copy = [...members];
                copy.splice(index, 1);
                setMembers(copy);
            };

            const handleAddMember = (name, gender) => {
                if (!name.trim()) return;
                const newM = {
                    id: `member-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    name: name.trim().slice(0, 6),
                    gender: gender,
                    present: true
                };
                setMembers([...members, newM]);
            };

            const handleCreateMatchTable = () => {
                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);

                if (activeAttendees.length < 4) {
                    triggerToast("⚠️ 試合を行うには出席者が最低4人必要です！");
                    return;
                }

                // Force save current configuration
                const resolvedName = groupName.trim() || "無題のグループ";
                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return {
                            ...g,
                            name: resolvedName,
                            members: cleanMembers,
                            settings: { weights }
                        };
                    }
                    return g;
                });
                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updatedGroups));

                // Generate first 10 matches
                const generated = [];
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, generated, weights);
                    if (nextMatch) {
                        generated.push(nextMatch);
                    } else {
                        break;
                    }
                }

                setMatchList(generated);
                setCurrentPage(1);
                setPage('match');
            };

            const handleAddMoreMatches = () => {
                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);

                if (activeAttendees.length < 4) {
                    triggerToast("⚠️ メンバーが足りません");
                    return;
                }

                const currentHistory = [...matchList];
                const nextTen = [];
                
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, [...currentHistory, ...nextTen], weights);
                    if (nextMatch) {
                        nextTen.push(nextMatch);
                    } else {
                        break;
                    }
                }

                if (nextTen.length === 0) {
                    triggerToast("⚠️ 組み合わせを作れません");
                    return;
                }

                const updatedMatches = [...currentHistory, ...nextTen];
                setMatchList(updatedMatches);
                
                // Automatically slide view to the newly added page
                const totalAddedPages = Math.ceil(updatedMatches.length / matchesPerPage);
                setCurrentPage(totalAddedPages);
                triggerToast("🎾 さらに10試合追加しました！");
            };

            const handleDownloadImage = () => {
                const element = document.getElementById('match-table-capture-area');
                if (!element) {
                    triggerToast("⚠️ キャプチャ対象が見つかりません");
                    return;
                }

                triggerToast("📸 画像を生成中...");
                
                html2canvas(element, {
                    scale: 2.2, // Enhanced crisp ratio
                    useCORS: true,
                    backgroundColor: "#f1f5f9",
                    logging: false
                }).then((canvas) => {
                    try {
                        const imgData = canvas.toDataURL('image/png');
                        setCapturedImage(imgData);
                        setShowImageModal(true);
                        triggerToast("✨ 画像が完成しました！");
                    } catch (e) {
                        console.error(e);
                        triggerToast("⚠️ 画像の保存に失敗しました。手動でスクリーンショットをお試しください。");
                    }
                });
            };

            const getMemberNameWithStyle = (id) => {
                const m = members.find(p => p.id === id);
                if (!m) return { name: "??", isMale: true };
                return { name: m.name, isMale: m.gender === "M" };
            };

            // Paginated Slicing
            const totalPages = Math.ceil(matchList.length / matchesPerPage);
            const startIndex = (currentPage - 1) * matchesPerPage;
            const visibleMatches = matchList.slice(startIndex, startIndex + matchesPerPage);

            return (
                <div className="flex-grow flex flex-col justify-between">
                    {/* Persistent Navigation Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center space-x-2 cursor-pointer" onClick={handleGoHome}>
                                <SmileIcon />
                                <span className="font-bold text-lg tracking-tight text-slate-800">
                                    にっこり対戦表
                                </span>
                            </div>
                            
                            {page !== 'top' && (

                        </div>
                    )}
                </div>
            );
        }

        function EmptyRowCreator({ onAddMember }) {
            const [name, setName] = useState("");
            const nameInputRef = useRef(null);

            const handleTriggerAdd = (gender) => {
                const trimmed = name.trim();
                if (!trimmed) {
                    nameInputRef.current?.focus();
                    return;
                }
                onAddMember(trimmed, gender);
                setName(""); 
                nameInputRef.current?.focus();
            };

            return (
                <div className="flex items-center space-x-2 p-2 rounded-xl border border-dashed border-slate-300 bg-white shadow-inner">
                    <div className="w-5 h-5 rounded border-2 border-dashed border-slate-300 bg-slate-50 shrink-0"></div>
                    
                    <input
                        ref={nameInputRef}
                        type="text"
                        value={name}
                        onChange={(e) => {
                            if (e.target.value.length <= 6) {
                                setName(e.target.value);
                            }
                        }}
                        placeholder="新しいメンバー名"
                        className="flex-grow bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-sm font-bold text-slate-600 px-1 py-0.5"
                    />

                    <div className="flex space-x-1 shrink-0">
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('M')}
                            className="px-2 py-1 text-xs font-bold rounded-lg border border-sky-200 text-sky-500 hover:bg-sky-50 active:scale-95 transition-all bg-sky-50/10"
                        >
                            男
                        </button>
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('F')}
                            className="px-2 py-1 text-xs font-bold rounded-lg border border-rose-200 text-rose-500 hover:bg-rose-50 active:scale-95 transition-all bg-rose-50/10"
                        >
                            女
                        </button>
                    </div>
                    
                    <div className="w-8 shrink-0"></div>
                </div>
            );
        }

        function WeightSlider({ label, desc, value, onChange }) {
            return (
                <div className="space-y-1 p-2 bg-slate-50 rounded-xl border border-slate-100">
                    <div className="flex justify-between items-center">
                        <span className="text-xs font-bold text-slate-700">{label}</span>
                        <span className="text-xs font-extrabold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100">{value}点</span>
                    </div>
                    {desc && <p className="text-[10px] text-slate-400">{desc}</p>}
                    <input 
                        type="range" 
                        min="0" 
                        max="10" 
                        step="1"
                        value={value} 
                        onChange={(e) => onChange(parseInt(e.target.value))}
                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-500 focus:outline-none"
                    />
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
