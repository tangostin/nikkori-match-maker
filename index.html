<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>にっこり対戦表メーカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Line+Seed+JP:wght@400;700;800&family=Nunito:wght@400;700;900&display=swap');
        body {
            font-family: 'Line Seed JP', 'Nunito', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SettingsIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        );

        const PlusIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <line x1="12" x2="12" y1="5" y2="19" />
                <line x1="5" x2="19" y1="12" y2="12" />
            </svg>
        );

        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
        );

        const HomeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
        );

        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const DEFAULT_GROUPS = [];

        function evaluateAndCreateNextMatch(presentMembers, history, weights) {
            if (presentMembers.length < 4) return null;

            const N = presentMembers.length;
            const configurations = [];

            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    for (let k = j + 1; k < N; k++) {
                        for (let l = k + 1; l < N; l++) {
                            const p1 = presentMembers[i];
                            const p2 = presentMembers[j];
                            const p3 = presentMembers[k];
                            const p4 = presentMembers[l];

                            configurations.push({ players: [p1, p2, p3, p4], t1: [p1, p2], t2: [p3, p4] });
                            configurations.push({ players: [p1, p3], t1: [p1, p3], t2: [p2, p4] });
                            configurations.push({ players: [p1, p4], t1: [p1, p4], t2: [p2, p3] });
                        }
                    }
                }
            }

            const playCounts = {};
            presentMembers.forEach(m => playCounts[m.id] = 0);
            history.forEach(m => {
                m.players.forEach(pid => {
                    if (playCounts[pid] !== undefined) playCounts[pid]++;
                });
            });

            const pairMatrix = {};
            const opponentMatrix = {};
            presentMembers.forEach(m1 => {
                pairMatrix[m1.id] = {};
                opponentMatrix[m1.id] = {};
                presentMembers.forEach(m2 => {
                    pairMatrix[m1.id][m2.id] = 0;
                    opponentMatrix[m1.id][m2.id] = 0;
                });
            });

            history.forEach(m => {
                const t1 = m.t1;
                const t2 = m.t2;
                if (t1.length === 2 && pairMatrix[t1[0]] && pairMatrix[t1[0]][t1[1]] !== undefined) {
                    pairMatrix[t1[0]][t1[1]]++;
                    pairMatrix[t1[1]][t1[0]]++;
                }
                if (t2.length === 2 && pairMatrix[t2[0]] && pairMatrix[t2[0]][t2[1]] !== undefined) {
                    pairMatrix[t2[0]][t2[1]]++;
                    pairMatrix[t2[1]][t2[0]]++;
                }
                t1.forEach(p1 => {
                    t2.forEach(p2 => {
                        if (opponentMatrix[p1] && opponentMatrix[p1][p2] !== undefined) {
                            opponentMatrix[p1][p2]++;
                            opponentMatrix[p2][p1]++;
                        }
                    });
                });
            });

            let bestConfigs = [];
            let minPenalty = Infinity;

            configurations.forEach(config => {
                const courtIds = new Set(config.players.map(p => p.id));
                const absentees = presentMembers.filter(m => !courtIds.has(m.id));

                let penalty = 0;

                // 1. Play counts
                const simulatedCounts = { ...playCounts };
                config.players.forEach(p => simulatedCounts[p.id]++);
                const countsArray = Object.values(simulatedCounts);
                const maxPlay = Math.max(...countsArray);
                const minPlay = Math.min(...countsArray);
                const playGap = maxPlay - minPlay;
                penalty += playGap * playGap * (weights.count * 150);

                // 2. Break consecutive
                if (history.length > 0) {
                    const lastMatch = history[history.length - 1];
                    const lastAbsentees = new Set(lastMatch.absentees);
                    
                    absentees.forEach(m => {
                        if (lastAbsentees.has(m.id)) {
                            penalty += weights.break * 250;
                            if (history.length > 1) {
                                const secondLastMatch = history[history.length - 2];
                                if (secondLastMatch.absentees.includes(m.id)) {
                                    penalty += weights.break * 800;
                                }
                            }
                        }
                    });
                }

                // 3. Consecutive plays
                config.players.forEach(p => {
                    let continuousCount = 0;
                    for (let i = history.length - 1; i >= 0; i--) {
                        if (history[i].players.includes(p.id)) {
                            continuousCount++;
                        } else {
                            break;
                        }
                    }
                    if (continuousCount >= 2) {
                        penalty += (continuousCount - 1) * weights.consecutive * 40;
                    }
                });

                // 4. Pairs
                const pair1Cost = pairMatrix[config.t1[0].id][config.t1[1].id];
                const pair2Cost = pairMatrix[config.t2[0].id][config.t2[1].id];
                penalty += (pair1Cost * pair1Cost) * weights.pair * 200;
                penalty += (pair2Cost * pair2Cost) * weights.pair * 200;

                // 5. Opponents
                let oppCost = 0;
                const oppPairs = [
                    [config.t1[0].id, config.t2[0].id],
                    [config.t1[0].id, config.t2[1].id],
                    [config.t1[1].id, config.t2[0].id],
                    [config.t1[1].id, config.t2[1].id]
                ];
                oppPairs.forEach(([pa, pb]) => {
                    oppCost += opponentMatrix[pa][pb];
                });
                penalty += (oppCost * oppCost) * weights.opponent * 40;

                // 6. Gender mix (Targeting balanced strength)
                const t1Males = config.t1.filter(p => p.gender === "M").length;
                const t2Males = config.t2.filter(p => p.gender === "M").length;

                if ((t1Males === 2 && t2Males === 0) || (t1Males === 0 && t2Males === 2)) {
                    // 男男 vs 女女 (Unfair)
                    penalty += weights.genderMix * 200; 
                } else if ((t1Males === 2 && t2Males === 1) || (t1Males === 1 && t2Males === 2) || 
                           (t1Males === 0 && t2Males === 1) || (t1Males === 1 && t2Males === 0)) {
                    // 男男 vs 男女 or 女女 vs 男女 (Slightly unfair)
                    penalty += weights.genderMix * 50;
                }
                // 男男vs男男, 女女vs女女, 男女vs男女 -> No penalty

                if (penalty < minPenalty) {
                    minPenalty = penalty;
                    bestConfigs = [config];
                } else if (penalty === minPenalty) {
                    bestConfigs.push(config);
                }
            });

            const chosen = bestConfigs[Math.floor(Math.random() * bestConfigs.length)];
            if (!chosen) return null;

            const chosenCourtIds = new Set(chosen.players.map(p => p.id));
            const chosenAbsentees = presentMembers.filter(m => !chosenCourtIds.has(m.id));

            return {
                id: `match-${history.length + 1}`,
                players: chosen.players.map(p => p.id),
                t1: chosen.t1.map(p => p.id),
                t2: chosen.t2.map(p => p.id),
                absentees: chosenAbsentees.map(p => p.id)
            };
        }

        function App() {
            const [page, setPage] = useState('top');
            const [groups, setGroups] = useState([]);
            const [activeGroupId, setActiveGroupId] = useState(null);
            
            const [groupName, setGroupName] = useState('');
            const [members, setMembers] = useState([]);
            const [weights, setWeights] = useState({
                count: 8,
                break: 7,
                consecutive: 6,
                pair: 5,
                opponent: 4,
                genderMix: 3
            });
            const [showSettings, setShowSettings] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            const [matchList, setMatchList] = useState([]);
            
            const [toast, setToast] = useState({ show: false, message: "" });
            const [capturedImage, setCapturedImage] = useState(null);
            const [showImageModal, setShowImageModal] = useState(false);

            useEffect(() => {
                const stored = localStorage.getItem('nikkori_tennis_groups');
                if (stored) {
                    try {
                        setGroups(JSON.parse(stored));
                    } catch (e) {
                        setGroups(DEFAULT_GROUPS);
                    }
                } else {
                    setGroups(DEFAULT_GROUPS);
                }
            }, []);

            const triggerToast = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: "" }), 2500);
            };

            const handleGoHome = () => {
                setPage('top');
                setActiveGroupId(null);
                setShowSettings(false);
                setShowDeleteConfirm(false);
            };
            
            const handleBackToGroup = () => {
                setPage('group');
            };

            const handleCreateNewGroup = () => {
                const newId = `group-${Date.now()}`;
                const newGroup = {
                    id: newId,
                    name: "",
                    members: [],
                    settings: {
                        weights: { count: 8, break: 7, consecutive: 6, pair: 5, opponent: 4, genderMix: 3 }
                    }
                };
                const updated = [...groups, newGroup];
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updated));
                
                setActiveGroupId(newId);
                setGroupName("");
                setMembers([]);
                setWeights(newGroup.settings.weights);
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSelectGroup = (gId) => {
                const target = groups.find(g => g.id === gId);
                if (!target) return;
                setActiveGroupId(gId);
                setGroupName(target.name);
                setMembers(target.members || []);
                setWeights(target.settings?.weights || { count: 8, break: 7, consecutive: 6, pair: 5, opponent: 4, genderMix: 3 });
                setShowSettings(false);
                setShowDeleteConfirm(false);
                setPage('group');
            };

            const handleSaveGroup = () => {
                const resolvedName = groupName.trim() || "（名称未設定のグループ）";
                const cleanMembers = members.filter(m => m.name.trim() !== "");

                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return { ...g, name: resolvedName, members: cleanMembers, settings: { weights } };
                    }
                    return g;
                });
                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updatedGroups));
                triggerToast("💾 保存しました");
            };

            const handleDeleteGroup = () => {
                const updated = groups.filter(g => g.id !== activeGroupId);
                setGroups(updated);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updated));
                handleGoHome();
            };

            const updateMemberName = (index, newName) => {
                if (newName.length > 4) return;
                const isDuplicate = members.some((m, i) => i !== index && m.name === newName && newName !== "");
                if (isDuplicate) {
                    triggerToast("⚠️ 同じメンバー名は使えません");
                    return; 
                }
                const copy = [...members];
                copy[index].name = newName;
                setMembers(copy);
            };

            const toggleMemberGender = (index, gender) => {
                const copy = [...members];
                copy[index].gender = gender;
                setMembers(copy);
            };

            const toggleMemberPresence = (index) => {
                const copy = [...members];
                copy[index].present = !copy[index].present;
                setMembers(copy);
            };

            const deleteMember = (index) => {
                const copy = [...members];
                copy.splice(index, 1);
                setMembers(copy);
            };

            const handleAddMember = (name, gender) => {
                if (members.some(m => m.name === name)) {
                    triggerToast("⚠️ 同じメンバー名は使えません");
                    return;
                }
                const newM = {
                    id: `member-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    name: name.slice(0, 4),
                    gender: gender,
                    present: true
                };
                setMembers([...members, newM]);
            };

            const handleCreateMatchTable = () => {
                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);

                if (activeAttendees.length < 4) {
                    triggerToast("⚠️ 試合を行うには参加者が最低4人必要です");
                    return;
                }

                // Auto-save before creating matches
                const resolvedName = groupName.trim() || "（名称未設定のグループ）";
                const updatedGroups = groups.map(g => {
                    if (g.id === activeGroupId) {
                        return { ...g, name: resolvedName, members: cleanMembers, settings: { weights } };
                    }
                    return g;
                });
                setGroups(updatedGroups);
                setMembers(cleanMembers);
                setGroupName(resolvedName);
                localStorage.setItem('nikkori_tennis_groups', JSON.stringify(updatedGroups));

                const generated = [];
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, generated, weights);
                    if (nextMatch) generated.push(nextMatch);
                    else break;
                }

                setMatchList(generated);
                setPage('match');
            };

            const handleAddMoreMatches = () => {
                const cleanMembers = members.filter(m => m.name.trim() !== "");
                const activeAttendees = cleanMembers.filter(m => m.present);
                if (activeAttendees.length < 4) return;

                const nextTen = [];
                for (let i = 0; i < 10; i++) {
                    const nextMatch = evaluateAndCreateNextMatch(activeAttendees, [...matchList, ...nextTen], weights);
                    if (nextMatch) nextTen.push(nextMatch);
                    else break;
                }

                if (nextTen.length === 0) {
                    triggerToast("⚠️ 組み合わせを作れません");
                    return;
                }
                setMatchList([...matchList, ...nextTen]);
                triggerToast("🎾 対戦表を追加しました");
            };

            const handleCopyImage = async () => {
                const element = document.getElementById('match-table-capture-area');
                if (!element) return;
                
                triggerToast("⏳ コピー中...");
                
                try {
                    const canvas = await html2canvas(element, {
                        scale: 2, 
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        logging: false
                    });

                    canvas.toBlob(async (blob) => {
                        try {
                            const item = new ClipboardItem({ "image/png": blob });
                            await navigator.clipboard.write([item]);
                            triggerToast("✅ コピー完了");
                        } catch (err) {
                            console.error("Clipboard API error:", err);
                            // Fallback to manual save modal if Clipboard API is blocked
                            const imgData = URL.createObjectURL(blob);
                            setCapturedImage(imgData);
                            setShowImageModal(true);
                            triggerToast("⚠️ コピーに失敗しました。画像を手動で保存してください。");
                        }
                    }, 'image/png');
                } catch (e) {
                    console.error(e);
                    triggerToast("⚠️ 画像の生成に失敗しました");
                }
            };

            const getMemberName = (id) => {
                const m = members.find(p => p.id === id);
                if (!m) return { name: "??", isMale: true };
                return { name: m.name, isMale: m.gender === "M" };
            };

            const NameSpan = ({ player }) => {
                const len = player.name.length;
                // Reduce font size slightly if name length is 4 for better fit without wrapping
                const textSize = len >= 4 ? 'text-[11px]' : 'text-sm';
                const bgColor = player.isMale ? 'bg-sky-50 text-sky-700' : 'bg-rose-50 text-rose-700';
                
                return (
                    <span className={`w-[48%] text-center font-bold py-0.5 rounded ${bgColor} ${textSize} leading-tight truncate`}>
                        {player.name}
                    </span>
                );
            };

            return (
                <div className="flex-grow flex flex-col justify-between">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center space-x-1 cursor-pointer" onClick={handleGoHome}>
                                <span className="font-extrabold text-lg tracking-tight text-slate-800">
                                    にっこり対戦表
                                </span>
                            </div>
                            {page !== 'top' && (
                                <button 
                                    onClick={handleGoHome}
                                    className="text-xs font-bold bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full flex items-center shadow-sm active:scale-95 transition-all"
                                >
                                    <HomeIcon /> TOPへ戻る
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="flex-grow max-w-md w-full mx-auto px-4 py-5 pb-10">
                        
                        {}
                        {page === 'top' && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-6 text-white shadow-md text-center">
                                    <h2 className="text-xl font-black mb-1">にっこり対戦表メーカー</h2>
                                    <p className="text-emerald-50 text-xs">簡単な操作でダブルスの最適な対戦表を作成</p>
                                </div>

                                <div className="space-y-2">
                                    {groups.length === 0 ? (
                                        <div className="text-center py-8 bg-white border border-dashed border-slate-200 rounded-xl text-slate-400 text-sm">
                                            グループがありません。<br/>下のボタンから作成してください。
                                        </div>
                                    ) : (
                                        groups.map(g => (
                                            <button
                                                key={g.id}
                                                onClick={() => handleSelectGroup(g.id)}
                                                className="w-full text-left bg-white border border-slate-100 hover:border-emerald-300 rounded-xl p-4 shadow-sm transition-all flex items-center justify-between group active:scale-[0.99]"
                                            >
                                                <div className="space-y-1">
                                                    <div className="font-bold text-slate-800 group-hover:text-emerald-600">
                                                        {g.name || "（名称未設定のグループ）"}
                                                    </div>
                                                    <div className="text-xs text-slate-400">
                                                        メンバー: {g.members?.length || 0}名
                                                    </div>
                                                </div>
                                                <span className="text-slate-300 group-hover:text-emerald-500">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                                                </span>
                                            </button>
                                        ))
                                    )}
                                </div>

                                <button
                                    onClick={handleCreateNewGroup}
                                    className="w-full bg-slate-800 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow transition-all flex items-center justify-center space-x-2"
                                >
                                    <PlusIcon /><span>新規グループを作成する</span>
                                </button>
                            </div>
                        )}

                        {}
                        {page === 'group' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                                    <label className="text-[10px] font-bold text-slate-400 block mb-1">グループ名</label>
                                    <input
                                        type="text"
                                        value={groupName}
                                        onChange={(e) => setGroupName(e.target.value)}
                                        placeholder="グループ名を入力"
                                        className="w-full font-bold text-lg border-b border-slate-200 focus:border-emerald-500 outline-none py-1 transition-colors"
                                    />
                                </div>

                                <div className="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm space-y-1">
                                    <div className="flex justify-between items-center mb-1 px-1">
                                        <span className="text-xs text-emerald-600 font-bold">登録 {members.length} 名</span>
                                    </div>
                                    
                                    <div className="space-y-1.5 pb-2">
                                        {members.map((m, index) => (
                                            <div key={m.id} className="flex items-center space-x-1.5 p-1 border-b border-slate-50">
                                                <button
                                                    onClick={() => toggleMemberPresence(index)}
                                                    className={`w-12 py-1 text-[10px] font-bold rounded shadow-sm transition-all shrink-0 ${
                                                        m.present 
                                                        ? 'bg-emerald-500 text-white' 
                                                        : 'bg-slate-200 text-slate-500'
                                                    }`}
                                                >
                                                    {m.present ? '参加' : '不参加'}
                                                </button>

                                                <input
                                                    type="text"
                                                    value={m.name}
                                                    onChange={(e) => updateMemberName(index, e.target.value)}
                                                    maxLength={4}
                                                    className={`flex-grow bg-transparent border-none focus:ring-0 outline-none text-sm font-bold px-1 ${!m.present && 'text-slate-400'}`}
                                                />

                                                <div className="flex space-x-1 shrink-0">
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleMemberGender(index, 'M')}
                                                        className={`w-7 py-1 text-[10px] font-bold rounded transition-all ${
                                                            m.gender === 'M'
                                                            ? 'bg-sky-500 text-white shadow-sm'
                                                            : 'bg-white text-slate-400 border border-slate-200'
                                                        }`}
                                                    >
                                                        男
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleMemberGender(index, 'F')}
                                                        className={`w-7 py-1 text-[10px] font-bold rounded transition-all ${
                                                            m.gender === 'F'
                                                            ? 'bg-rose-500 text-white shadow-sm'
                                                            : 'bg-white text-slate-400 border border-slate-200'
                                                        }`}
                                                    >
                                                        女
                                                    </button>
                                                </div>

                                                <button onClick={() => deleteMember(index)} className="p-1 text-slate-300 hover:text-rose-500 shrink-0">
                                                    <TrashIcon />
                                                </button>
                                            </div>
                                        ))}

                                        <EmptyRowCreator onAddMember={handleAddMember} nextNumber={members.length + 1} />
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm relative">
                                    <button
                                        type="button"
                                        onClick={() => setShowSettings(!showSettings)}
                                        className="flex items-center text-xs font-bold text-slate-600 focus:outline-none"
                                    >
                                        <SettingsIcon className="mr-1" />
                                        詳細設定
                                        <span className={`ml-1 transform transition-transform ${showSettings ? 'rotate-180' : ''}`}>▼</span>
                                    </button>
                                    
                                    {/* Action Buttons: Positioned relative to the settings header to save vertical space */}
                                    <div className="absolute top-2.5 right-3">
                                        <button
                                            type="button"
                                            onClick={handleSaveGroup}
                                            className="bg-slate-500 hover:bg-slate-600 text-white font-bold py-1 px-4 rounded-lg shadow-sm text-xs transition-colors"
                                        >
                                            保存
                                        </button>
                                    </div>

                                    {showSettings && (
                                        <div className="pt-3 space-y-2 mt-2 border-t border-slate-100">
                                            <WeightSlider label="試合数" value={weights.count} onChange={(val) => setWeights({...weights, count: val})} />
                                            <WeightSlider label="連続休憩数" value={weights.break} onChange={(val) => setWeights({...weights, break: val})} />
                                            <WeightSlider label="連続試合数" value={weights.consecutive} onChange={(val) => setWeights({...weights, consecutive: val})} />
                                            <WeightSlider label="ペア均等" value={weights.pair} onChange={(val) => setWeights({...weights, pair: val})} />
                                            <WeightSlider label="対戦相手均等" value={weights.opponent} onChange={(val) => setWeights({...weights, opponent: val})} />
                                            <WeightSlider label="男女分け" value={weights.genderMix} onChange={(val) => setWeights({...weights, genderMix: val})} />
                                        </div>
                                    )}
                                </div>

                                <button
                                    type="button"
                                    onClick={handleCreateMatchTable}
                                    className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-sm transition-all text-base mt-2"
                                >
                                    対戦表作成
                                </button>

                                <div className="mt-8 text-center pb-4">
                                    {!showDeleteConfirm ? (
                                        <button onClick={() => setShowDeleteConfirm(true)} className="text-[11px] font-bold text-rose-400">
                                            グループを削除
                                        </button>
                                    ) : (
                                        <div className="bg-rose-50 rounded-xl p-3 inline-block">
                                            <p className="text-[10px] font-bold text-rose-700 mb-2">削除しますか？</p>
                                            <div className="flex space-x-2">
                                                <button onClick={() => setShowDeleteConfirm(false)} className="bg-white text-slate-600 border border-slate-200 px-3 py-1 rounded text-[10px] font-bold">キャンセル</button>
                                                <button onClick={handleDeleteGroup} className="bg-rose-500 text-white px-3 py-1 rounded text-[10px] font-bold">削除する</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {}
                        {page === 'match' && (
                            <div className="space-y-3">
                                
                                <div id="match-table-capture-area" className="bg-white px-3 py-3 border border-slate-200 rounded-xl">
                                    <div className="flex justify-between items-baseline border-b-2 border-slate-800 pb-1 mb-1">
                                        <h2 className="font-bold text-base text-slate-800 truncate pr-2">
                                            {groupName || "（名称未設定のグループ）"}
                                        </h2>
                                        <span className="text-[10px] text-slate-500 whitespace-nowrap font-bold">
                                            {new Date().toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' })}
                                        </span>
                                    </div>

                                    <div className="flex flex-col">
                                        {matchList.map((m, index) => {
                                            const p1 = getMemberName(m.t1[0]);
                                            const p2 = getMemberName(m.t1[1]);
                                            const p3 = getMemberName(m.t2[0]);
                                            const p4 = getMemberName(m.t2[1]);
                                            const absNames = m.absentees.map(id => getMemberName(id));

                                            return (
                                                <div key={m.id} className="border-b border-slate-200 py-1 flex flex-col justify-center">
                                                    <div className="flex items-end mb-0.5 w-full overflow-hidden">
                                                        <span className="text-[10px] font-extrabold text-slate-700 w-11 shrink-0 leading-none">
                                                            第{index + 1}試合
                                                        </span>
                                                        {absNames.length > 0 && (
                                                            <span className="text-[9px] text-slate-500 truncate leading-none pb-[1px]">
                                                                休: {absNames.map(a => a.name).join(', ')}
                                                            </span>
                                                        )}
                                                    </div>
                                                    
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center justify-center space-x-1 w-[46%]">
                                                            <NameSpan player={p1} />
                                                            <NameSpan player={p2} />
                                                        </div>
                                                        <div className="w-[8%] text-center text-[10px] text-slate-400 font-bold">vs</div>
                                                        <div className="flex items-center justify-center space-x-1 w-[46%]">
                                                            <NameSpan player={p3} />
                                                            <NameSpan player={p4} />
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="space-y-2 mt-4">
                                    <button
                                        type="button"
                                        onClick={handleAddMoreMatches}
                                        className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl shadow-sm transition-all text-sm"
                                    >
                                        対戦表を追加
                                    </button>
                                    
                                    <button
                                        type="button"
                                        onClick={handleCopyImage}
                                        className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-sm transition-all text-sm flex items-center justify-center"
                                    >
                                        <CopyIcon /> 対戦表をコピー
                                    </button>
                                    
                                    <button
                                        type="button"
                                        onClick={handleBackToGroup}
                                        className="w-full text-slate-400 hover:text-slate-500 font-bold py-2 text-xs transition-colors mt-2"
                                    >
                                        設定画面に戻る
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {showImageModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl relative animate-in fade-in zoom-in duration-200">
                                <div className="text-center space-y-1">
                                    <h3 className="font-extrabold text-lg text-slate-800">
                                        画像が生成されました
                                    </h3>
                                    <p className="text-xs text-slate-500 leading-normal">
                                        ブラウザの制限によりクリップボードへ直接コピーできませんでした。画像を長押しして保存してください。
                                    </p>
                                </div>

                                <div className="border border-slate-200 rounded-xl overflow-hidden shadow-inner max-h-[380px] overflow-y-auto">
                                    <img src={capturedImage} alt="Match Schedule" className="w-full h-auto block" />
                                </div>

                                <div className="flex justify-center">
                                    <button
                                        onClick={() => setShowImageModal(false)}
                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-6 rounded-lg text-xs transition-all w-full"
                                    >
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast.show && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-white font-bold text-xs py-2 px-5 rounded-full shadow-lg whitespace-nowrap">
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        function EmptyRowCreator({ onAddMember, nextNumber }) {
            const [name, setName] = useState("");
            
            const handleTriggerAdd = (gender) => {
                const finalName = name.trim() || nextNumber.toString();
                onAddMember(finalName, gender);
                setName(""); 
            };

            return (
                <div className="flex items-center space-x-1.5 p-1">
                    <div className="w-12 h-6 border border-dashed border-slate-300 rounded shrink-0 flex items-center justify-center">
                        <span className="text-[10px] text-slate-300 font-bold">+</span>
                    </div>
                    
                    <input
                        type="text"
                        value={name}
                        onChange={(e) => { if (e.target.value.length <= 4) setName(e.target.value); }}
                        placeholder={nextNumber.toString()}
                        className="flex-grow bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-sm font-bold text-slate-600 px-1"
                    />

                    <div className="flex space-x-1 shrink-0">
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('M')}
                            className="w-7 py-1 text-[10px] font-bold rounded border border-sky-200 text-sky-500 hover:bg-sky-50 transition-all bg-white"
                        >
                            男
                        </button>
                        <button
                            type="button"
                            onClick={() => handleTriggerAdd('F')}
                            className="w-7 py-1 text-[10px] font-bold rounded border border-rose-200 text-rose-500 hover:bg-rose-50 transition-all bg-white"
                        >
                            女
                        </button>
                    </div>
                    <div className="w-6 shrink-0"></div>
                </div>
            );
        }

        function WeightSlider({ label, value, onChange }) {
            return (
                <div className="flex items-center justify-between space-x-2 py-0.5">
                    <span className="text-xs font-bold text-slate-600 w-24 shrink-0">{label}</span>
                    <input 
                        type="range" 
                        min="0" 
                        max="10" 
                        step="1"
                        value={value} 
                        onChange={(e) => onChange(parseInt(e.target.value))}
                        className="flex-grow h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-500"
                    />
                    <span className="text-[10px] font-bold text-emerald-600 w-6 text-right">{value}</span>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
